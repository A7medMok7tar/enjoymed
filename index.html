<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>MedBook Store</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500;1,700&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
/* ═══════════════════════════════════════════
   TELEGRAM THEME TOKENS
═══════════════════════════════════════════ */
:root {
  /* Raw Telegram variables with sensible fallbacks */
  --tg-bg:        var(--tg-theme-bg-color,           #ffffff);
  --tg-bg2:       var(--tg-theme-secondary-bg-color, #f0f2f5);
  --tg-text:      var(--tg-theme-text-color,         #000000);
  --tg-hint:      var(--tg-theme-hint-color,         #707579);
  --tg-link:      var(--tg-theme-link-color,         #2481cc);
  --tg-btn:       var(--tg-theme-button-color,       #2481cc);
  --tg-btn-txt:   var(--tg-theme-button-text-color,  #ffffff);
  --tg-accent:    var(--tg-theme-accent-text_color,  #2481cc);

  /* Semantic layer — everything reads from here */
  --bg:           var(--tg-bg);
  --bg2:          var(--tg-bg2);
  --surface:      var(--tg-bg2);
  --text:         var(--tg-text);
  --muted:        var(--tg-hint);
  --brand:        var(--tg-btn);
  --brand-txt:    var(--tg-btn-txt);

  /* Gold accent — adapts luminance per scheme */
  --gold:         #b8923a;
  --gold-light:   #d4ab58;
  --gold-glow:    rgba(184,146,58,.18);
  --gold-surface: rgba(184,146,58,.10);

  /* Danger */
  --danger:       #e53935;
  --danger-soft:  rgba(229,57,53,.12);

  /* Floating nav */
  --nav-h:        72px;
  --nav-inset:    12px;

  /* Radii */
  --r-xs: 8px;
  --r-sm: 12px;
  --r:    18px;
  --r-lg: 24px;
  --r-xl: 32px;

  /* Fonts */
  --serif: 'Playfair Display', Georgia, serif;
  --sans:  'Instrument Sans', system-ui, sans-serif;

  /* Borders & shadows — theme-aware */
  --border:       color-mix(in srgb, var(--tg-hint) 18%, transparent);
  --shadow-sm:    0 2px 12px rgba(0,0,0,.07);
  --shadow-md:    0 6px 28px rgba(0,0,0,.10);
  --shadow-lg:    0 16px 48px rgba(0,0,0,.14);
  --shadow-gold:  0 8px 32px var(--gold-glow);
}

/* Dark-scheme gold tweak */
@media (prefers-color-scheme: dark) {
  :root {
    --gold:       #c9a84c;
    --gold-light: #e0c070;
    --gold-glow:  rgba(201,168,76,.22);
    --gold-surface: rgba(201,168,76,.12);
    --shadow-sm:  0 2px 12px rgba(0,0,0,.25);
    --shadow-md:  0 6px 28px rgba(0,0,0,.32);
    --shadow-lg:  0 16px 48px rgba(0,0,0,.40);
  }
}

/* ═══════════════════════════════════════════
   RESET
═══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  background: var(--bg2);
  color: var(--text);
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

button { font-family: var(--sans); cursor: pointer; -webkit-tap-highlight-color: transparent; }
img { display: block; }

/* ═══════════════════════════════════════════
   APP SHELL
═══════════════════════════════════════════ */
#app {
  display: flex;
  flex-direction: column;
  height: 100%;
  position: relative;
}

/* ═══════════════════════════════════════════
   HEADER
═══════════════════════════════════════════ */
.app-header {
  position: sticky;
  top: 0;
  z-index: 50;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  height: 56px;
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  flex-shrink: 0;
}

.hdr-logo {
  display: flex;
  align-items: center;
  gap: 9px;
  flex: 1;
}

.logo-emblem {
  width: 34px; height: 34px;
  border-radius: var(--r-sm);
  background: linear-gradient(145deg, var(--gold), var(--gold-light));
  box-shadow: 0 2px 10px var(--gold-glow);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.logo-emblem svg {
  width: 18px; height: 18px;
  fill: #fff;
}

.logo-name {
  font-family: var(--serif);
  font-size: 19px;
  font-weight: 700;
  letter-spacing: -.2px;
  color: var(--text);
  line-height: 1;
}

.logo-name span { font-style: italic; color: var(--gold); }

.hdr-cart-btn {
  position: relative;
  width: 38px; height: 38px;
  border: none;
  background: var(--surface);
  border-radius: var(--r-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text);
  transition: background .15s;
  flex-shrink: 0;
}
.hdr-cart-btn:active { background: var(--border); }
.hdr-cart-btn svg { width: 20px; height: 20px; stroke: currentColor; stroke-width: 1.8; fill: none; }

.hdr-badge {
  position: absolute;
  top: -4px; right: -4px;
  background: var(--danger);
  color: #fff;
  font-size: 9px;
  font-weight: 700;
  min-width: 17px; height: 17px;
  border-radius: 9px;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 0 4px;
  border: 2px solid var(--bg);
}
.hdr-badge.on { display: flex; }

/* ═══════════════════════════════════════════
   SCROLL AREA
═══════════════════════════════════════════ */
#content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  scroll-behavior: smooth;
  padding-bottom: calc(var(--nav-h) + var(--nav-inset) * 2 + 12px);
}

/* ═══════════════════════════════════════════
   FLOATING BOTTOM NAV
═══════════════════════════════════════════ */
.float-nav {
  position: fixed;
  bottom: var(--nav-inset);
  left: var(--nav-inset);
  right: var(--nav-inset);
  height: var(--nav-h);
  z-index: 200;

  background: var(--bg);
  border-radius: var(--r-xl);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-lg);

  display: flex;
  align-items: center;
  padding: 6px;
  gap: 4px;

  /* Frosted glass */
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  background: color-mix(in srgb, var(--bg) 88%, transparent);
}

.nav-item {
  flex: 1;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  border: none;
  background: transparent;
  color: var(--muted);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .4px;
  text-transform: uppercase;
  border-radius: calc(var(--r-xl) - 6px);
  transition: color .2s, background .2s;
  position: relative;
}

.nav-item.active {
  color: var(--brand-txt);
  background: var(--brand);
  box-shadow: 0 4px 16px color-mix(in srgb, var(--brand) 40%, transparent);
}

.nav-item svg {
  width: 22px; height: 22px;
  stroke: currentColor;
  stroke-width: 1.8;
  fill: none;
  transition: transform .2s;
}
.nav-item.active svg { transform: translateY(-1px); }

.nav-pip {
  position: absolute;
  top: 8px; right: calc(50% - 18px);
  width: 7px; height: 7px;
  background: var(--danger);
  border-radius: 50%;
  border: 2px solid var(--bg);
  display: none;
}
.nav-pip.on { display: block; }

/* ═══════════════════════════════════════════
   PAGES
═══════════════════════════════════════════ */
.page { display: none; }
.page.active {
  display: block;
  animation: fadeSlide .22s ease;
}
@keyframes fadeSlide {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ═══════════════════════════════════════════
   HOME PAGE
═══════════════════════════════════════════ */

/* Hero card */
.hero-wrap { padding: 14px 14px 0; }

.hero-card {
  position: relative;
  border-radius: var(--r-lg);
  overflow: hidden;
  cursor: pointer;
  transition: transform .18s ease, box-shadow .18s;
  box-shadow: var(--shadow-md);
  background: var(--surface);
}
.hero-card:active { transform: scale(.975); box-shadow: var(--shadow-sm); }

.hero-img {
  width: 100%;
  height: 230px;
  object-fit: cover;
}

.hero-ph {
  width: 100%; height: 230px;
  background: linear-gradient(145deg,
    color-mix(in srgb, var(--gold) 15%, var(--surface)),
    var(--surface));
  display: flex; align-items: center; justify-content: center;
  font-size: 64px;
}

.hero-scrim {
  position: absolute; inset: 0;
  background: linear-gradient(to top,
    rgba(0,0,0,.88) 0%,
    rgba(0,0,0,.28) 55%,
    transparent 100%);
}

.hero-chip {
  position: absolute;
  top: 14px; left: 14px;
  background: var(--gold);
  color: #fff;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 5px 11px;
  border-radius: 20px;
}

.hero-body {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 16px;
}

.hero-title {
  font-family: var(--serif);
  font-size: 21px;
  font-weight: 700;
  color: #fff;
  line-height: 1.2;
  margin-bottom: 10px;
  letter-spacing: -.1px;
}

.hero-foot {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.price-pills { display: flex; gap: 6px; align-items: center; }

.pill {
  font-size: 11px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 20px;
  line-height: 1;
}

.pill-gold {
  background: color-mix(in srgb, var(--gold) 25%, transparent);
  color: var(--gold-light);
  border: 1px solid color-mix(in srgb, var(--gold) 32%, transparent);
}

.pill-white {
  background: rgba(255,255,255,.12);
  color: rgba(255,255,255,.85);
  border: 1px solid rgba(255,255,255,.16);
}

.circle-add {
  width: 38px; height: 38px;
  border-radius: 50%;
  border: none;
  background: var(--gold);
  color: #fff;
  font-size: 22px;
  line-height: 1;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 3px 12px var(--gold-glow);
  transition: background .2s, transform .12s;
}
.circle-add:active { transform: scale(.88); }
.circle-add.on { background: #22c55e; font-size: 16px; }

/* Section header */
.sec-hdr {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  padding: 20px 14px 10px;
}

.sec-hdr h2 {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -.2px;
}
.sec-hdr h2 em { font-style: italic; color: var(--gold); }

.sec-count {
  font-size: 12px;
  color: var(--muted);
  font-weight: 500;
}

/* Book rows */
.book-list {
  padding: 0 14px;
  display: flex;
  flex-direction: column;
  gap: 9px;
}

.book-row {
  display: flex;
  align-items: center;
  gap: 13px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 11px 13px 11px 11px;
  cursor: pointer;
  transition: border-color .18s, box-shadow .18s, transform .12s;
}
.book-row:active {
  transform: scale(.985);
  border-color: color-mix(in srgb, var(--gold) 45%, transparent);
  box-shadow: 0 4px 18px var(--gold-glow);
}

.book-thumb {
  width: 56px; height: 74px;
  border-radius: var(--r-xs);
  object-fit: cover;
  flex-shrink: 0;
  background: var(--surface);
}

.book-thumb-ph {
  width: 56px; height: 74px;
  border-radius: var(--r-xs);
  background: linear-gradient(145deg,
    color-mix(in srgb, var(--gold) 10%, var(--surface)),
    var(--surface));
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.book-info { flex: 1; min-width: 0; }

.book-title {
  font-family: var(--serif);
  font-size: 15px;
  font-weight: 700;
  line-height: 1.25;
  margin-bottom: 4px;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}

.book-desc {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 7px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.book-tags { display: flex; gap: 5px; }

.tag {
  font-size: 10px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 20px;
  line-height: 1;
}
.tag-gold {
  background: var(--gold-surface);
  color: var(--gold);
  border: 1px solid color-mix(in srgb, var(--gold) 22%, transparent);
}
.tag-muted {
  background: color-mix(in srgb, var(--muted) 10%, var(--surface));
  color: var(--muted);
}

.row-add {
  width: 34px; height: 34px;
  border-radius: 50%;
  border: 1.5px solid color-mix(in srgb, var(--gold) 45%, transparent);
  background: transparent;
  color: var(--gold);
  font-size: 20px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background .18s, border-color .18s, transform .12s;
}
.row-add:active { transform: scale(.84); }
.row-add.on {
  background: #22c55e;
  border-color: #22c55e;
  color: #fff;
  font-size: 15px;
}

/* Skeleton */
.sk-hero {
  height: 230px;
  border-radius: var(--r-lg);
  margin: 14px 14px 0;
}
.sk-row {
  display: flex; gap: 13px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 11px;
}
.sk-thumb { width: 56px; height: 74px; border-radius: var(--r-xs); flex-shrink: 0; }
.sk-lines { flex: 1; display: flex; flex-direction: column; gap: 8px; padding-top: 6px; }
.sk-line { height: 12px; border-radius: 6px; }
.w75 { width: 75%; } .w55 { width: 55%; } .w40 { width: 40%; }

.shimmer {
  background: linear-gradient(90deg,
    var(--surface) 0%,
    color-mix(in srgb, var(--muted) 14%, var(--surface)) 50%,
    var(--surface) 100%);
  background-size: 200% 100%;
  animation: shim 1.6s ease-in-out infinite;
}
@keyframes shim { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* ═══════════════════════════════════════════
   DETAIL SHEET
═══════════════════════════════════════════ */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.55);
  z-index: 300;
  display: none;
  align-items: flex-end;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
}
.overlay.open { display: flex; }

.sheet {
  background: var(--bg);
  border-radius: var(--r-xl) var(--r-xl) 0 0;
  width: 100%;
  max-height: 92vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  animation: sheetUp .3s cubic-bezier(.32,.72,0,1);
}
@keyframes sheetUp {
  from { transform: translateY(100%); }
  to   { transform: translateY(0); }
}

.sheet-handle {
  width: 38px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 14px auto 0;
}

.sheet-cover-wrap {
  margin: 14px 14px 0;
  border-radius: var(--r);
  overflow: hidden;
  background: var(--surface);
  max-height: 280px;
}

.sheet-cover-img {
  width: 100%;
  max-height: 280px;
  object-fit: contain;
}

.sheet-cover-ph {
  width: 100%; height: 200px;
  display: flex; align-items: center; justify-content: center;
  font-size: 72px;
}

.sheet-body { padding: 20px 16px 44px; }

.sheet-eyebrow {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 7px;
}

.sheet-title {
  font-family: var(--serif);
  font-size: 27px;
  font-weight: 700;
  line-height: 1.18;
  margin-bottom: 12px;
  letter-spacing: -.2px;
}

.sheet-desc {
  font-size: 14px;
  color: var(--muted);
  line-height: 1.75;
  margin-bottom: 20px;
}

.sheet-divider {
  height: 1px;
  background: var(--border);
  margin-bottom: 18px;
}

.sheet-prices {
  display: flex;
  gap: 10px;
  margin-bottom: 22px;
}

.price-block {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.price-block.gold-block {
  background: var(--gold-surface);
  border-color: color-mix(in srgb, var(--gold) 25%, transparent);
}

.pb-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .9px;
  text-transform: uppercase;
  color: var(--muted);
}
.price-block.gold-block .pb-label { color: var(--gold); }

.pb-value {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
}
.price-block.gold-block .pb-value { color: var(--gold-light); }

.sheet-btns {
  display: flex;
  gap: 10px;
}

.btn-close {
  padding: 15px 18px;
  border: 1.5px solid var(--border);
  border-radius: var(--r-sm);
  background: var(--surface);
  color: var(--muted);
  font-size: 14px;
  font-weight: 600;
  transition: opacity .15s;
}
.btn-close:active { opacity: .65; }

.btn-add {
  flex: 1;
  padding: 15px;
  border: none;
  border-radius: var(--r-sm);
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  box-shadow: var(--shadow-gold);
  transition: opacity .15s, transform .1s;
}
.btn-add:active { opacity: .85; transform: scale(.97); }

/* ═══════════════════════════════════════════
   CART PAGE
═══════════════════════════════════════════ */
.cart-empty {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 58vh;
  gap: 14px;
  padding: 32px 24px;
  text-align: center;
}

.empty-circle {
  width: 80px; height: 80px;
  border-radius: 50%;
  background: var(--surface);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 4px;
}

.empty-circle svg {
  width: 34px; height: 34px;
  stroke: var(--muted);
  stroke-width: 1.5;
  fill: none;
}

.empty-title {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 700;
}

.empty-sub {
  font-size: 14px;
  color: var(--muted);
  line-height: 1.6;
}

.empty-btn {
  margin-top: 4px;
  padding: 12px 24px;
  border: 1.5px solid var(--border);
  border-radius: var(--r-sm);
  background: var(--surface);
  color: var(--text);
  font-size: 14px;
  font-weight: 600;
}
.empty-btn:active { opacity: .7; }

/* Cart items */
.cart-items { padding: 14px 14px 0; display: flex; flex-direction: column; gap: 9px; }

.cart-card {
  display: flex;
  align-items: center;
  gap: 13px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 11px;
  animation: fadeSlide .18s ease;
}

.cart-thumb {
  width: 54px; height: 70px;
  border-radius: var(--r-xs);
  object-fit: cover;
  flex-shrink: 0;
  background: var(--surface);
}

.cart-thumb-ph {
  width: 54px; height: 70px;
  border-radius: var(--r-xs);
  background: var(--surface);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.cart-info { flex: 1; min-width: 0; }

.cart-title {
  font-family: var(--serif);
  font-size: 15px;
  font-weight: 700;
  line-height: 1.25;
  margin-bottom: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.cart-price {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 8px;
}

.qty-row { display: flex; align-items: center; gap: 10px; }

.qty-btn {
  width: 28px; height: 28px;
  border-radius: var(--r-xs);
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 15px;
  display: flex; align-items: center; justify-content: center;
  transition: background .12s;
}
.qty-btn:active { background: var(--border); }

.qty-val { font-size: 14px; font-weight: 700; min-width: 20px; text-align: center; }

.remove-btn {
  width: 34px; height: 34px;
  border-radius: var(--r-xs);
  border: none;
  background: var(--danger-soft);
  color: var(--danger);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: opacity .15s;
}
.remove-btn svg { width: 17px; height: 17px; stroke: currentColor; stroke-width: 2; fill: none; }
.remove-btn:active { opacity: .65; }

/* Receipt block */
.receipt {
  margin: 12px 14px 0;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
}

.receipt-hdr {
  padding: 13px 15px;
  border-bottom: 1px dashed var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}

.receipt-hdr svg {
  width: 16px; height: 16px;
  stroke: var(--muted);
  stroke-width: 2;
  fill: none;
}

.receipt-hdr-lbl {
  font-family: var(--serif);
  font-size: 15px;
  font-weight: 700;
}

.receipt-rows { padding: 12px 15px; display: flex; flex-direction: column; gap: 7px; }

.receipt-row {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
}
.receipt-row .lbl { color: var(--muted); }
.receipt-row .val { font-weight: 600; }

.receipt-total {
  padding: 13px 15px;
  border-top: 1px dashed var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.receipt-total .lbl {
  font-family: var(--serif);
  font-size: 17px;
  font-weight: 700;
}

.total-amounts { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
.total-stars { font-size: 14px; font-weight: 700; color: var(--gold); }
.total-egp   { font-size: 12px; color: var(--muted); }

/* Checkout */
.checkout-wrap { padding: 12px 14px 0; }

.checkout-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .9px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}

.checkout-btns { display: flex; flex-direction: column; gap: 9px; }

.pay-btn {
  width: 100%;
  padding: 17px;
  border: none;
  border-radius: var(--r);
  font-size: 15px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: transform .1s, opacity .15s;
}
.pay-btn:active { transform: scale(.98); opacity: .88; }

.pay-btn svg { width: 20px; height: 20px; stroke: currentColor; stroke-width: 2; fill: none; }

.pay-stars {
  background: linear-gradient(135deg, #c8900a, #f0b832, #b87d0a);
  color: #1a0e00;
  box-shadow: 0 6px 22px rgba(200,144,10,.32);
}

.pay-voda {
  background: linear-gradient(135deg, #b71c1c, #e53935, #a31515);
  color: #fff;
  box-shadow: 0 6px 22px rgba(183,28,28,.28);
}

/* ═══════════════════════════════════════════
   SUPPORT PAGE
═══════════════════════════════════════════ */
.support-page { padding: 0 14px 14px; }

.support-hero {
  padding: 24px 0 22px;
  text-align: center;
}

.support-ring {
  width: 68px; height: 68px;
  border-radius: 50%;
  background: var(--gold-surface);
  border: 1.5px solid color-mix(in srgb, var(--gold) 28%, transparent);
  box-shadow: var(--shadow-gold);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 16px;
}

.support-ring svg {
  width: 28px; height: 28px;
  stroke: var(--gold);
  stroke-width: 1.8;
  fill: none;
}

.support-hero h2 {
  font-family: var(--serif);
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -.2px;
  margin-bottom: 7px;
}

.support-hero p {
  font-size: 14px;
  color: var(--muted);
  line-height: 1.65;
}

/* FAQ */
.faq { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }

.faq-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
  transition: border-color .2s;
}
.faq-card.open { border-color: color-mix(in srgb, var(--gold) 40%, transparent); }

.faq-q {
  display: flex;
  align-items: center;
  padding: 14px 15px;
  gap: 12px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.faq-q-icon {
  width: 32px; height: 32px;
  border-radius: var(--r-xs);
  background: var(--gold-surface);
  border: 1px solid color-mix(in srgb, var(--gold) 20%, transparent);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.faq-q-icon svg { width: 15px; height: 15px; stroke: var(--gold); stroke-width: 2; fill: none; }

.faq-q-text { flex: 1; font-size: 14px; font-weight: 600; line-height: 1.3; }

.faq-chevron {
  color: var(--muted);
  flex-shrink: 0;
  transition: transform .22s ease, color .2s;
}
.faq-chevron svg { width: 18px; height: 18px; stroke: currentColor; stroke-width: 2.2; fill: none; }
.faq-card.open .faq-chevron { transform: rotate(180deg); color: var(--gold); }

.faq-a {
  max-height: 0;
  overflow: hidden;
  transition: max-height .3s ease;
}
.faq-a-inner {
  padding: 0 15px 14px 15px;
  border-top: 1px solid var(--border);
  padding-top: 12px;
  font-size: 13px;
  color: var(--muted);
  line-height: 1.7;
}
.faq-card.open .faq-a { max-height: 260px; }

/* Contact cards */
.contact-cards { display: flex; flex-direction: column; gap: 9px; }

.contact-card {
  display: flex;
  align-items: center;
  gap: 14px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 14px 15px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  text-align: left;
  width: 100%;
  color: var(--text);
  transition: border-color .18s, box-shadow .18s, transform .12s;
}
.contact-card:active {
  transform: scale(.985);
  border-color: color-mix(in srgb, var(--brand) 35%, transparent);
  box-shadow: 0 4px 18px color-mix(in srgb, var(--brand) 10%, transparent);
}

.cc-icon {
  width: 44px; height: 44px;
  border-radius: var(--r-sm);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.cc-icon svg { width: 21px; height: 21px; stroke: #fff; stroke-width: 1.9; fill: none; }

.cc-icon.blue   { background: linear-gradient(135deg, #1a73e8, #4292ff); }
.cc-icon.orange { background: linear-gradient(135deg, #e67e22, #f39c12); }
.cc-icon.red    { background: linear-gradient(135deg, #e53935, #f44336); }
.cc-icon.green  { background: linear-gradient(135deg, #2e7d32, #43a047); }

.cc-text { flex: 1; }
.cc-text h3 { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
.cc-text p  { font-size: 12px; color: var(--muted); }

.cc-arrow {
  color: var(--muted);
}
.cc-arrow svg { width: 18px; height: 18px; stroke: currentColor; stroke-width: 2; fill: none; }

/* ═══════════════════════════════════════════
   TOAST
═══════════════════════════════════════════ */
#toast {
  position: fixed;
  bottom: calc(var(--nav-h) + var(--nav-inset) * 2 + 14px);
  left: 50%;
  transform: translateX(-50%) translateY(14px);
  background: var(--text);
  color: var(--bg);
  padding: 10px 20px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
  opacity: 0;
  pointer-events: none;
  white-space: nowrap;
  z-index: 999;
  transition: opacity .2s, transform .2s;
  display: flex; align-items: center; gap: 7px;
  box-shadow: var(--shadow-md);
}
#toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <header class="app-header">
    <div class="hdr-logo">
      <div class="logo-emblem">
        <!-- Book SVG icon -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 2h12a2 2 0 012 2v16a2 2 0 01-2 2H4a2 2 0 01-2-2V4a2 2 0 012-2z"/>
          <path d="M8 6h8M8 10h8M8 14h5" stroke="rgba(0,0,0,.35)" stroke-width="1.5" stroke-linecap="round" fill="none"/>
        </svg>
      </div>
      <span class="logo-name">Med<span>Book</span></span>
    </div>
    <button class="hdr-cart-btn" onclick="switchTab('cart')" aria-label="Cart">
      <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 001.95-1.57L23 6H6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span class="hdr-badge" id="hdr-badge"></span>
    </button>
  </header>

  <!-- CONTENT -->
  <div id="content">

    <!-- HOME -->
    <div class="page active" id="page-home">
      <div id="home-root">
        <div class="sk-hero shimmer"></div>
        <div class="sec-hdr"><h2>All <em>Books</em></h2></div>
        <div class="book-list" style="padding:0 14px">
          <div class="sk-row"><div class="sk-thumb shimmer"></div><div class="sk-lines"><div class="sk-line w75 shimmer"></div><div class="sk-line w55 shimmer"></div><div class="sk-line w40 shimmer"></div></div></div>
          <div class="sk-row"><div class="sk-thumb shimmer"></div><div class="sk-lines"><div class="sk-line w75 shimmer"></div><div class="sk-line w55 shimmer"></div><div class="sk-line w40 shimmer"></div></div></div>
        </div>
      </div>
    </div>

    <!-- CART -->
    <div class="page" id="page-cart">
      <div id="cart-root"></div>
    </div>

    <!-- SUPPORT -->
    <div class="page" id="page-support">
      <div class="support-page">

        <div class="support-hero">
          <div class="support-ring">
            <!-- Headset / support icon -->
            <svg viewBox="0 0 24 24"><path d="M3 18v-6a9 9 0 0118 0v6"/><path d="M21 19a2 2 0 01-2 2h-1a2 2 0 01-2-2v-3a2 2 0 012-2h3zM3 19a2 2 0 002 2h1a2 2 0 002-2v-3a2 2 0 00-2-2H3z"/></svg>
          </div>
          <h2>How can we help?</h2>
          <p>Find quick answers below or get in<br>touch — we respond fast.</p>
        </div>

        <div class="faq" id="faq-list"></div>

        <div class="contact-cards">

          <button class="contact-card" onclick="contactAction('chat')">
            <div class="cc-icon blue">
              <!-- Chat bubble icon -->
              <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
            </div>
            <div class="cc-text">
              <h3>Live Chat</h3>
              <p>Talk to our support team</p>
            </div>
            <div class="cc-arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
          </button>

          <button class="contact-card" onclick="contactAction('orders')">
            <div class="cc-icon orange">
              <!-- Package icon -->
              <svg viewBox="0 0 24 24"><path d="M16.5 9.4l-9-5.19M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 002 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
            </div>
            <div class="cc-text">
              <h3>Order Issues</h3>
              <p>Track or query your orders</p>
            </div>
            <div class="cc-arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
          </button>

          <button class="contact-card" onclick="contactAction('payment')">
            <div class="cc-icon red">
              <!-- Credit card icon -->
              <svg viewBox="0 0 24 24"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
            </div>
            <div class="cc-text">
              <h3>Payment Problem</h3>
              <p>Issue with a payment?</p>
            </div>
            <div class="cc-arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
          </button>

          <button class="contact-card" onclick="contactAction('refund')">
            <div class="cc-icon green">
              <!-- Refresh/refund icon -->
              <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
            </div>
            <div class="cc-text">
              <h3>Refund Request</h3>
              <p>Request a refund on an order</p>
            </div>
            <div class="cc-arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
          </button>

        </div>
      </div>
    </div>

  </div><!-- /content -->

  <!-- FLOATING NAV -->
  <nav class="float-nav">
    <button class="nav-item active" id="nav-home" onclick="switchTab('home')">
      <svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
      Home
    </button>
    <button class="nav-item" id="nav-cart" onclick="switchTab('cart')">
      <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 001.95-1.57L23 6H6"/></svg>
      Cart
      <span class="nav-pip" id="nav-pip"></span>
    </button>
    <button class="nav-item" id="nav-support" onclick="switchTab('support')">
      <svg viewBox="0 0 24 24"><path d="M3 18v-6a9 9 0 0118 0v6"/><path d="M21 19a2 2 0 01-2 2h-1a2 2 0 01-2-2v-3a2 2 0 012-2h3zM3 19a2 2 0 002 2h1a2 2 0 002-2v-3a2 2 0 00-2-2H3z"/></svg>
      Support
    </button>
  </nav>

</div>

<!-- DETAIL SHEET -->
<div class="overlay" id="overlay" onclick="onOverlayClick(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div id="sheet-body"></div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
/* ════════════════════════════════════
   Telegram WebApp bootstrap
════════════════════════════════════ */
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

// Inject Telegram color scheme class for fine-grained CSS targeting
document.documentElement.setAttribute(
  'data-theme',
  tg.colorScheme || 'light'
);

// Re-apply theme if Telegram signals a change
tg.onEvent('themeChanged', () => {
  document.documentElement.setAttribute('data-theme', tg.colorScheme || 'light');
});

/* ════════════════════════════════════
   State
════════════════════════════════════ */
let books = [];
let cart  = {};   // { bookId: qty }

/* ════════════════════════════════════
   FAQ content
════════════════════════════════════ */
const FAQ = [
  {
    icon: `<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`,
    q: "How are books delivered?",
    a: "After payment is confirmed, the PDF is sent directly to this Telegram chat. No links, no downloads — the file arrives instantly."
  },
  {
    icon: `<svg viewBox="0 0 24 24"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>`,
    q: "How does Vodafone Cash work?",
    a: "Send the total to our Vodafone Cash number, then provide your phone number and a screenshot of the transfer. An admin verifies it and delivers your books — usually within minutes."
  },
  {
    icon: `<svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`,
    q: "What are Telegram Stars?",
    a: "Stars are Telegram's built-in currency, purchasable in the Telegram app. Paying with Stars is fully automatic — your book arrives the moment payment completes."
  },
  {
    icon: `<svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>`,
    q: "Can I buy multiple books?",
    a: "Yes — add as many books as you want to your cart and check out in one go. All books are delivered together once payment is confirmed."
  },
  {
    icon: `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
    q: "What if my payment is refused?",
    a: "You'll receive a notification. Make sure your screenshot clearly shows the amount and recipient number. Tap 'Payment Problem' below to reach support."
  }
];

/* ════════════════════════════════════
   Tab switching
════════════════════════════════════ */
function switchTab(tab) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById(`page-${tab}`).classList.add('active');
  document.getElementById(`nav-${tab}`).classList.add('active');
  if (tab === 'cart') renderCart();
  haptic('selection');
}

/* ════════════════════════════════════
   Load books
════════════════════════════════════ */
async function loadBooks() {
  try {
    const r = await fetch('/api/books');
    const d = await r.json();
    books = d.books || [];
  } catch(e) { books = []; }
  renderHome();
}

/* ════════════════════════════════════
   Render Home
════════════════════════════════════ */
function renderHome() {
  const root = document.getElementById('home-root');
  if (!books.length) {
    root.innerHTML = `
      <div style="text-align:center;padding:64px 24px;color:var(--muted)">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" style="margin:0 auto 16px;display:block;opacity:.45"><path d="M4 2h12a2 2 0 012 2v16a2 2 0 01-2 2H4a2 2 0 01-2-2V4a2 2 0 012-2z"/><path d="M8 6h8M8 10h8M8 14h5" stroke-linecap="round"/></svg>
        <p style="font-family:var(--serif);font-size:20px;color:var(--text);margin-bottom:6px">No books yet</p>
        <p style="font-size:14px;line-height:1.6">New titles are added regularly.<br>Check back soon.</p>
      </div>`;
    return;
  }

  const [hero, ...rest] = books;
  let html = '';

  // Hero
  html += `
    <div class="hero-wrap">
      <div class="hero-card" onclick="openSheet(${hero.id})">
        ${hero.cover_url
          ? `<img class="hero-img" src="${esc(hero.cover_url)}" alt="${esc(hero.title)}"/>`
          : `<div class="hero-ph">📖</div>`}
        <div class="hero-scrim"></div>
        <div class="hero-chip">Featured</div>
        <div class="hero-body">
          <div class="hero-title">${esc(hero.title)}</div>
          <div class="hero-foot">
            <div class="price-pills">
              <span class="pill pill-gold">⭐ ${hero.price_stars}</span>
              <span class="pill pill-white">${hero.price_egp.toFixed(2)} EGP</span>
            </div>
            <button class="circle-add ${cart[hero.id]?'on':''}"
              id="hadd-${hero.id}"
              onclick="event.stopPropagation();quickAdd(${hero.id})">
              ${cart[hero.id]?'✓':'+'}
            </button>
          </div>
        </div>
      </div>
    </div>`;

  if (rest.length) {
    html += `
      <div class="sec-hdr">
        <h2>All <em>Books</em></h2>
        <span class="sec-count">${books.length} titles</span>
      </div>
      <div class="book-list">
        ${rest.map(b => bookRowHTML(b)).join('')}
      </div>`;
  }

  root.innerHTML = html;
}

function bookRowHTML(b) {
  const on = !!cart[b.id];
  return `
    <div class="book-row" onclick="openSheet(${b.id})">
      ${b.cover_url
        ? `<img class="book-thumb" src="${esc(b.cover_url)}" alt="${esc(b.title)}"/>`
        : `<div class="book-thumb-ph">📖</div>`}
      <div class="book-info">
        <div class="book-title">${esc(b.title)}</div>
        <div class="book-desc">${esc(b.description||'Medical reference book')}</div>
        <div class="book-tags">
          <span class="tag tag-gold">⭐ ${b.price_stars}</span>
          <span class="tag tag-muted">${b.price_egp.toFixed(2)} EGP</span>
        </div>
      </div>
      <button class="row-add ${on?'on':''}" id="radd-${b.id}"
        onclick="event.stopPropagation();quickAdd(${b.id})">
        ${on?'✓':'+'}
      </button>
    </div>`;
}

/* ════════════════════════════════════
   Detail Sheet
════════════════════════════════════ */
function openSheet(id) {
  const b = books.find(x => x.id === id);
  if (!b) return;
  haptic('light');

  const on = !!cart[b.id];
  document.getElementById('sheet-body').innerHTML = `
    <div class="sheet-cover-wrap">
      ${b.cover_url
        ? `<img class="sheet-cover-img" src="${esc(b.cover_url)}" alt="${esc(b.title)}"/>`
        : `<div class="sheet-cover-ph">📖</div>`}
    </div>
    <div class="sheet-body">
      <div class="sheet-eyebrow">Medical Reference</div>
      <div class="sheet-title">${esc(b.title)}</div>
      <p class="sheet-desc">${esc(b.description||'A comprehensive medical reference book.')}</p>
      <div class="sheet-divider"></div>
      <div class="sheet-prices">
        <div class="price-block gold-block">
          <span class="pb-label">Telegram Stars</span>
          <span class="pb-value">⭐ ${b.price_stars}</span>
        </div>
        <div class="price-block">
          <span class="pb-label">Vodafone Cash</span>
          <span class="pb-value">${b.price_egp.toFixed(2)} EGP</span>
        </div>
      </div>
      <div class="sheet-btns">
        <button class="btn-close" onclick="closeSheet()">Close</button>
        <button class="btn-add" onclick="addFromSheet(${b.id})">
          ${on ? '✓ In Cart' : '+ Add to Cart'}
        </button>
      </div>
    </div>`;

  document.getElementById('overlay').classList.add('open');
  tg.BackButton.show();
  tg.BackButton.onClick(closeSheet);
}

function closeSheet() {
  document.getElementById('overlay').classList.remove('open');
  tg.BackButton.hide();
  tg.BackButton.offClick(closeSheet);
}

function onOverlayClick(e) {
  if (e.target === document.getElementById('overlay')) closeSheet();
}

function addFromSheet(id) {
  addToCart(id);
  closeSheet();
  switchTab('cart');
}

/* ════════════════════════════════════
   Cart logic
════════════════════════════════════ */
function quickAdd(id) { addToCart(id); }

function addToCart(id) {
  cart[id] = (cart[id] || 0) + 1;
  updateBadges();
  refreshBtns(id);
  showToast('Added to cart');
  haptic('medium');
}

function removeFromCart(id) {
  delete cart[id];
  updateBadges();
  refreshBtns(id);
  renderCart();
  haptic('light');
}

function changeQty(id, d) {
  const n = (cart[id] || 0) + d;
  if (n <= 0) return removeFromCart(id);
  cart[id] = n;
  renderCart();
  haptic('selection');
}

function cartItems() {
  return Object.entries(cart)
    .filter(([,q]) => q > 0)
    .map(([id, qty]) => ({ b: books.find(x => x.id == id), qty }))
    .filter(x => x.b);
}

function totals() {
  return cartItems().reduce(
    (a, {b, qty}) => ({ stars: a.stars+b.price_stars*qty, egp: a.egp+b.price_egp*qty, n: a.n+qty }),
    { stars:0, egp:0, n:0 }
  );
}

function updateBadges() {
  const n = Object.values(cart).reduce((a,b) => a+b, 0);
  const hb = document.getElementById('hdr-badge');
  const np = document.getElementById('nav-pip');
  hb.textContent = n;
  hb.classList.toggle('on', n > 0);
  np.classList.toggle('on', n > 0);
}

function refreshBtns(id) {
  const on = !!cart[id];
  [`hadd-${id}`, `radd-${id}`].forEach(sel => {
    const el = document.getElementById(sel);
    if (!el) return;
    el.classList.toggle('on', on);
    el.textContent = on ? '✓' : '+';
  });
}

/* ════════════════════════════════════
   Render Cart
════════════════════════════════════ */
function renderCart() {
  const items = cartItems();
  const t     = totals();
  const root  = document.getElementById('cart-root');

  if (!items.length) {
    root.innerHTML = `
      <div class="cart-empty">
        <div class="empty-circle">
          <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 001.95-1.57L23 6H6"/></svg>
        </div>
        <h3 class="empty-title">Cart is empty</h3>
        <p class="empty-sub">Browse medical books on the Home tab<br>and add what you need.</p>
        <button class="empty-btn" onclick="switchTab('home')">Browse Books</button>
      </div>`;
    return;
  }

  const itemsHtml = items.map(({b, qty}) => `
    <div class="cart-card">
      ${b.cover_url
        ? `<img class="cart-thumb" src="${esc(b.cover_url)}" alt="${esc(b.title)}"/>`
        : `<div class="cart-thumb-ph">📖</div>`}
      <div class="cart-info">
        <div class="cart-title">${esc(b.title)}</div>
        <div class="cart-price">⭐ ${b.price_stars} · ${b.price_egp.toFixed(2)} EGP</div>
        <div class="qty-row">
          <button class="qty-btn" onclick="changeQty(${b.id},-1)">−</button>
          <span class="qty-val">${qty}</span>
          <button class="qty-btn" onclick="changeQty(${b.id},+1)">+</button>
        </div>
      </div>
      <button class="remove-btn" onclick="removeFromCart(${b.id})" aria-label="Remove">
        <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      </button>
    </div>`).join('');

  const slipRows = items.map(({b, qty}) => `
    <div class="receipt-row">
      <span class="lbl">${esc(b.title)} × ${qty}</span>
      <span class="val">${(b.price_egp*qty).toFixed(2)} EGP</span>
    </div>`).join('');

  root.innerHTML = `
    <div class="cart-items">${itemsHtml}</div>

    <div class="receipt">
      <div class="receipt-hdr">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        <span class="receipt-hdr-lbl">Order Summary</span>
      </div>
      <div class="receipt-rows">${slipRows}</div>
      <div class="receipt-total">
        <span class="lbl">Total</span>
        <div class="total-amounts">
          <span class="total-stars">⭐ ${t.stars} Stars</span>
          <span class="total-egp">${t.egp.toFixed(2)} EGP</span>
        </div>
      </div>
    </div>

    <div class="checkout-wrap">
      <div class="checkout-label">Choose payment method</div>
      <div class="checkout-btns">
        <button class="pay-btn pay-stars" onclick="checkout('stars')">
          <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          Pay with Telegram Stars
        </button>
        <button class="pay-btn pay-voda" onclick="checkout('vodafone')">
          <svg viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18" stroke-linecap="round" stroke-width="3"/></svg>
          Pay via Vodafone Cash
        </button>
      </div>
    </div>`;
}

/* ════════════════════════════════════
   Checkout
════════════════════════════════════ */
function checkout(method) {
  const items = cartItems();
  if (!items.length) return;
  haptic('medium');
  tg.sendData(JSON.stringify({
    action: method === 'stars' ? 'checkout_stars' : 'checkout_vodafone',
    cart: items.map(({b, qty}) => ({ book_id: b.id, quantity: qty }))
  }));
}

/* ════════════════════════════════════
   FAQ
════════════════════════════════════ */
function renderFAQ() {
  document.getElementById('faq-list').innerHTML = FAQ.map((f, i) => `
    <div class="faq-card" id="faq-${i}">
      <div class="faq-q" onclick="toggleFAQ(${i})">
        <div class="faq-q-icon">${f.icon}</div>
        <span class="faq-q-text">${f.q}</span>
        <span class="faq-chevron">
          <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
        </span>
      </div>
      <div class="faq-a"><div class="faq-a-inner">${f.a}</div></div>
    </div>`).join('');
}

function toggleFAQ(i) {
  const el = document.getElementById(`faq-${i}`);
  const was = el.classList.contains('open');
  document.querySelectorAll('.faq-card').forEach(c => c.classList.remove('open'));
  if (!was) el.classList.add('open');
  haptic('selection');
}

function contactAction(type) {
  haptic('light');
  tg.sendData(JSON.stringify({ action: 'support', type }));
}

/* ════════════════════════════════════
   Utils
════════════════════════════════════ */
let _tt;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('on');
  clearTimeout(_tt);
  _tt = setTimeout(() => el.classList.remove('on'), 2000);
}

function haptic(s) {
  try { tg.HapticFeedback.impactOccurred(s); } catch(e) {}
}

function esc(s) {
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ════════════════════════════════════
   Boot
════════════════════════════════════ */
renderFAQ();
loadBooks();
</script>
</body>
</html>
