<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>MedBook Store</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,600&family=Figtree:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
/* ══════════════════════════════════════════════
   TOKENS
══════════════════════════════════════════════ */
:root {
  /* Telegram theme passthrough */
  --tg-bg:      var(--tg-theme-bg-color,           #0e1117);
  --tg-bg2:     var(--tg-theme-secondary-bg-color, #161b26);
  --tg-text:    var(--tg-theme-text-color,         #e8e6df);
  --tg-hint:    var(--tg-theme-hint-color,         #6b7280);
  --tg-btn:     var(--tg-theme-button-color,       #1a56db);
  --tg-btn-txt: var(--tg-theme-button-text-color,  #ffffff);

  /* Brand identity — deep navy + warm gold */
  --navy:   #0d1b2a;
  --navy2:  #162032;
  --navy3:  #1e2d42;
  --gold:   #c9a84c;
  --gold2:  #e2c06b;
  --gold3:  #f0d896;
  --cream:  #f5f0e8;
  --rust:   #c0392b;

  /* Semantic aliases (light/dark aware) */
  --bg:         var(--tg-bg);
  --bg2:        var(--tg-bg2);
  --surface:    color-mix(in srgb, var(--tg-text) 6%, var(--tg-bg));
  --border:     color-mix(in srgb, var(--tg-hint) 20%, transparent);
  --text:       var(--tg-text);
  --muted:      var(--tg-hint);
  --accent:     var(--gold);
  --accent2:    var(--gold2);

  /* Layout */
  --nav-h:    64px;
  --hdr-h:    58px;
  --r:        16px;
  --r-sm:     10px;

  /* Typography */
  --serif:    'Cormorant Garamond', Georgia, serif;
  --sans:     'Figtree', system-ui, sans-serif;
}

/* Force dark brand palette when Telegram gives us a dark theme,
   light palette when light */
@media (prefers-color-scheme: light) {
  :root {
    --navy:  #f5f0e8;
    --navy2: #ede8df;
    --navy3: #e0d9cc;
    --gold:  #8a6620;
    --gold2: #a07828;
    --gold3: #6b4f18;
    --cream: #1a1208;
  }
}

/* ══════════════════════════════════════════════
   RESET & BASE
══════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

/* ══════════════════════════════════════════════
   LAYOUT SHELL
══════════════════════════════════════════════ */
#app { display: flex; flex-direction: column; height: 100%; }

#content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding-bottom: calc(var(--nav-h) + 12px);
  -webkit-overflow-scrolling: touch;
  scroll-behavior: smooth;
}

/* ══════════════════════════════════════════════
   HEADER
══════════════════════════════════════════════ */
header {
  height: var(--hdr-h);
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 18px;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 100;
  flex-shrink: 0;
}

.hdr-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  flex: 1;
}

.hdr-icon {
  width: 34px; height: 34px;
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  border-radius: 10px;
  display: grid;
  place-items: center;
  font-size: 16px;
  flex-shrink: 0;
  box-shadow: 0 2px 8px color-mix(in srgb, var(--gold) 35%, transparent);
}

.hdr-title {
  font-family: var(--serif);
  font-size: 20px;
  font-weight: 600;
  letter-spacing: .3px;
  line-height: 1;
}

.hdr-title span {
  color: var(--accent);
  font-style: italic;
}

.hdr-cart-btn {
  position: relative;
  width: 38px; height: 38px;
  border: none;
  background: var(--surface);
  border-radius: 11px;
  display: grid;
  place-items: center;
  cursor: pointer;
  color: var(--text);
  -webkit-tap-highlight-color: transparent;
  transition: background .2s;
}
.hdr-cart-btn:active { background: var(--border); }
.hdr-cart-btn svg { width: 20px; height: 20px; stroke-width: 1.7; }

.hdr-badge {
  position: absolute;
  top: -3px; right: -3px;
  background: var(--rust);
  color: #fff;
  font-size: 9px;
  font-weight: 700;
  min-width: 16px; height: 16px;
  border-radius: 8px;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 0 4px;
  border: 2px solid var(--bg);
}
.hdr-badge.visible { display: flex; }

/* ══════════════════════════════════════════════
   BOTTOM NAV
══════════════════════════════════════════════ */
nav {
  height: var(--nav-h);
  background: var(--bg);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: stretch;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 200;
  padding-bottom: env(safe-area-inset-bottom, 0);
}

.nav-tab {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  cursor: pointer;
  border: none;
  background: transparent;
  color: var(--muted);
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: .3px;
  text-transform: uppercase;
  transition: color .2s;
  position: relative;
  -webkit-tap-highlight-color: transparent;
}

.nav-tab.active { color: var(--accent); }

.nav-tab-icon {
  width: 28px; height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 9px;
  transition: background .2s, transform .15s;
}

.nav-tab.active .nav-tab-icon {
  background: color-mix(in srgb, var(--accent) 15%, transparent);
  transform: translateY(-1px);
}

.nav-tab svg { width: 20px; height: 20px; stroke-width: 1.7; }

.nav-dot {
  position: absolute;
  top: 8px;
  left: calc(50% + 7px);
  width: 7px; height: 7px;
  background: var(--rust);
  border-radius: 50%;
  border: 2px solid var(--bg);
  display: none;
}
.nav-dot.visible { display: block; }

/* ══════════════════════════════════════════════
   PAGES
══════════════════════════════════════════════ */
.page { display: none; }
.page.active {
  display: block;
  animation: pageIn .2s ease;
}
@keyframes pageIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ══════════════════════════════════════════════
   HOME PAGE
══════════════════════════════════════════════ */

/* ─ Hero (featured book) ─ */
.hero-wrap {
  padding: 16px 16px 0;
}

.hero-card {
  position: relative;
  border-radius: 20px;
  overflow: hidden;
  background: var(--navy2);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: transform .15s;
}
.hero-card:active { transform: scale(.985); }

.hero-cover {
  width: 100%;
  height: 220px;
  object-fit: cover;
  display: block;
}

.hero-cover-ph {
  width: 100%;
  height: 220px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 64px;
  background: linear-gradient(145deg,
    color-mix(in srgb, var(--accent) 12%, var(--bg2)),
    color-mix(in srgb, var(--accent) 4%, var(--bg2)));
}

.hero-gradient {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,.85) 0%, rgba(0,0,0,.2) 55%, transparent 100%);
}

.hero-tag {
  position: absolute;
  top: 14px; left: 14px;
  background: var(--accent);
  color: #0d1108;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .8px;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 20px;
}

.hero-body {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 18px;
}

.hero-title {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 600;
  color: #fff;
  line-height: 1.2;
  margin-bottom: 8px;
  letter-spacing: .2px;
}

.hero-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.hero-prices {
  display: flex;
  gap: 8px;
  align-items: center;
}

.price-tag {
  font-size: 12px;
  font-weight: 600;
  padding: 4px 9px;
  border-radius: 20px;
}

.price-tag.stars {
  background: color-mix(in srgb, var(--gold) 25%, transparent);
  color: var(--gold3);
  border: 1px solid color-mix(in srgb, var(--gold) 30%, transparent);
}

.price-tag.egp {
  background: rgba(255,255,255,.1);
  color: rgba(255,255,255,.85);
  border: 1px solid rgba(255,255,255,.15);
}

.hero-add-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: none;
  background: var(--accent);
  color: #0d1108;
  font-size: 20px;
  font-weight: 300;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .2s, transform .1s;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
.hero-add-btn:active { transform: scale(.9); }
.hero-add-btn.added {
  background: #22c55e;
  color: #fff;
  font-size: 15px;
}

/* ─ Section header ─ */
.section-hdr {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  padding: 22px 16px 12px;
}

.section-hdr h2 {
  font-family: var(--serif);
  font-size: 24px;
  font-weight: 600;
  letter-spacing: .2px;
  line-height: 1;
}

.section-hdr h2 em {
  font-style: italic;
  color: var(--accent);
}

.section-count {
  font-size: 12px;
  color: var(--muted);
  font-weight: 500;
}

/* ─ Book list ─ */
.books-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding: 0 16px 8px;
}

.book-row {
  display: flex;
  align-items: center;
  gap: 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 12px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: border-color .2s, transform .1s, box-shadow .2s;
  position: relative;
  overflow: hidden;
}

.book-row:active {
  transform: scale(.985);
  border-color: color-mix(in srgb, var(--accent) 40%, transparent);
  box-shadow: 0 4px 20px color-mix(in srgb, var(--accent) 10%, transparent);
}

.book-row-cover {
  width: 58px;
  height: 76px;
  border-radius: 9px;
  object-fit: cover;
  flex-shrink: 0;
  background: var(--bg2);
}

.book-row-cover-ph {
  width: 58px;
  height: 76px;
  border-radius: 9px;
  background: linear-gradient(145deg,
    color-mix(in srgb, var(--accent) 10%, var(--bg2)),
    var(--bg2));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.book-row-info {
  flex: 1;
  min-width: 0;
}

.book-row-title {
  font-family: var(--serif);
  font-size: 17px;
  font-weight: 600;
  line-height: 1.25;
  margin-bottom: 5px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  letter-spacing: .1px;
}

.book-row-desc {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.4;
  margin-bottom: 8px;
  display: -webkit-box;
  -webkit-line-clamp: 1;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.book-row-footer {
  display: flex;
  align-items: center;
  gap: 6px;
}

.book-row-price {
  font-size: 11px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 20px;
}

.book-row-price.stars {
  background: color-mix(in srgb, var(--gold) 15%, var(--bg2));
  color: var(--gold2);
}

.book-row-price.egp {
  background: var(--bg2);
  color: var(--muted);
}

.book-row-add {
  margin-left: auto;
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 1.5px solid color-mix(in srgb, var(--accent) 50%, transparent);
  background: transparent;
  color: var(--accent);
  font-size: 19px;
  font-weight: 300;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .2s, border-color .2s, transform .1s;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
.book-row-add:active { transform: scale(.88); }
.book-row-add.added {
  background: #22c55e;
  border-color: #22c55e;
  color: #fff;
  font-size: 14px;
}

/* ─ Skeleton ─ */
.skel-hero {
  height: 220px;
  border-radius: 20px;
  margin: 16px 16px 0;
}
.skel-row {
  display: flex;
  gap: 14px;
  padding: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
}
.skel-cover { width: 58px; height: 76px; border-radius: 9px; flex-shrink: 0; }
.skel-lines { flex: 1; display: flex; flex-direction: column; gap: 8px; padding-top: 4px; }
.skel-line { height: 13px; border-radius: 6px; }
.skel-line.w80 { width: 80%; }
.skel-line.w50 { width: 50%; }
.skel-line.w65 { width: 65%; }

.shimmer {
  background: linear-gradient(90deg,
    var(--surface) 0%,
    color-mix(in srgb, var(--muted) 12%, var(--surface)) 50%,
    var(--surface) 100%);
  background-size: 200% 100%;
  animation: shimmer 1.6s ease-in-out infinite;
}
@keyframes shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* ══════════════════════════════════════════════
   BOOK DETAIL SHEET
══════════════════════════════════════════════ */
.sheet-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.6);
  z-index: 400;
  display: none;
  align-items: flex-end;
  backdrop-filter: blur(3px);
  -webkit-backdrop-filter: blur(3px);
}
.sheet-overlay.open { display: flex; }

.sheet {
  background: var(--bg);
  border-radius: 24px 24px 0 0;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  animation: sheetUp .3s cubic-bezier(.32,.72,0,1);
}
@keyframes sheetUp {
  from { transform: translateY(100%); }
  to   { transform: translateY(0); }
}

.sheet-handle {
  width: 40px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 12px auto 0;
}

.sheet-cover-wrap {
  position: relative;
  margin: 16px 16px 0;
  border-radius: 16px;
  overflow: hidden;
  background: var(--surface);
}

.sheet-cover {
  width: 100%;
  max-height: 280px;
  object-fit: contain;
  display: block;
}

.sheet-cover-ph {
  width: 100%;
  height: 200px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 72px;
}

.sheet-body {
  padding: 20px 16px 40px;
}

.sheet-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 8px;
}

.sheet-title {
  font-family: var(--serif);
  font-size: 28px;
  font-weight: 600;
  line-height: 1.15;
  margin-bottom: 12px;
  letter-spacing: .2px;
}

.sheet-title em { font-style: italic; }

.sheet-desc {
  font-size: 14px;
  color: var(--muted);
  line-height: 1.7;
  margin-bottom: 20px;
}

.sheet-divider {
  height: 1px;
  background: var(--border);
  margin-bottom: 20px;
}

.sheet-price-row {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.sheet-price-pill {
  flex: 1;
  padding: 12px 0;
  border-radius: 12px;
  text-align: center;
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.sheet-price-pill .pill-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .8px;
  text-transform: uppercase;
  opacity: .65;
}

.sheet-price-pill .pill-value {
  font-family: var(--serif);
  font-size: 20px;
  font-weight: 600;
}

.pill-gold {
  background: color-mix(in srgb, var(--gold) 12%, var(--surface));
  border: 1px solid color-mix(in srgb, var(--gold) 25%, transparent);
  color: var(--gold2);
}

.pill-neutral {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
}

.sheet-btns {
  display: flex;
  gap: 10px;
}

.btn {
  flex: 1;
  padding: 15px 0;
  border: none;
  border-radius: 14px;
  font-family: var(--sans);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity .15s, transform .1s;
  -webkit-tap-highlight-color: transparent;
}
.btn:active { transform: scale(.97); opacity: .85; }

.btn-outline {
  background: var(--surface);
  color: var(--text);
  border: 1.5px solid var(--border);
  flex: 0 0 auto;
  padding: 15px 18px;
}

.btn-gold {
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  color: #0d1108;
  font-weight: 700;
}

/* ══════════════════════════════════════════════
   CART PAGE
══════════════════════════════════════════════ */
.cart-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
  gap: 12px;
  padding: 32px;
  text-align: center;
}

.cart-empty-icon {
  width: 80px; height: 80px;
  border-radius: 50%;
  background: var(--surface);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 34px;
  margin-bottom: 4px;
}

.cart-empty h3 {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 600;
}

.cart-empty p {
  font-size: 14px;
  color: var(--muted);
  line-height: 1.6;
}

.cart-empty-btn {
  margin-top: 8px;
  padding: 12px 24px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

/* Cart items */
.cart-items-wrap {
  padding: 16px 16px 0;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.cart-item {
  display: flex;
  align-items: center;
  gap: 13px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 12px;
  animation: pageIn .2s ease;
}

.cart-item-cover {
  width: 54px; height: 70px;
  border-radius: 9px;
  object-fit: cover;
  flex-shrink: 0;
  background: var(--bg2);
}

.cart-item-cover-ph {
  width: 54px; height: 70px;
  border-radius: 9px;
  background: var(--bg2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.cart-item-info { flex: 1; min-width: 0; }

.cart-item-title {
  font-family: var(--serif);
  font-size: 16px;
  font-weight: 600;
  line-height: 1.25;
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.cart-item-price {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 8px;
}

.qty-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.qty-btn {
  width: 28px; height: 28px;
  border-radius: 8px;
  border: 1.5px solid var(--border);
  background: var(--bg2);
  color: var(--text);
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: border-color .15s, background .15s;
}
.qty-btn:active { background: var(--border); }

.qty-val {
  font-size: 15px;
  font-weight: 600;
  min-width: 20px;
  text-align: center;
}

.cart-remove {
  width: 34px; height: 34px;
  border-radius: 10px;
  border: none;
  background: color-mix(in srgb, var(--rust) 12%, var(--surface));
  color: var(--rust);
  font-size: 15px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}

/* Order slip */
.order-slip {
  margin: 16px 16px 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
}

.slip-header {
  padding: 14px 16px;
  border-bottom: 1px dashed var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}

.slip-header-icon {
  font-size: 16px;
}

.slip-header-title {
  font-family: var(--serif);
  font-size: 16px;
  font-weight: 600;
  letter-spacing: .2px;
}

.slip-rows {
  padding: 12px 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.slip-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
}

.slip-row .label { color: var(--muted); }
.slip-row .value { font-weight: 600; }

.slip-total {
  padding: 14px 16px;
  border-top: 1px dashed var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.slip-total .label {
  font-family: var(--serif);
  font-size: 17px;
  font-weight: 600;
}

.slip-total .values {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 2px;
}

.slip-total .v-stars {
  font-size: 14px;
  font-weight: 700;
  color: var(--gold2);
}

.slip-total .v-egp {
  font-size: 12px;
  color: var(--muted);
}

/* Checkout buttons */
.checkout-section {
  padding: 14px 16px 0;
}

.checkout-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .8px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}

.checkout-btns {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.checkout-btn {
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: var(--r);
  font-family: var(--sans);
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  -webkit-tap-highlight-color: transparent;
  transition: transform .1s, opacity .15s, box-shadow .2s;
  position: relative;
  overflow: hidden;
}
.checkout-btn:active { transform: scale(.98); opacity: .9; }

.checkout-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,.1);
  opacity: 0;
  transition: opacity .15s;
}
.checkout-btn:active::before { opacity: 1; }

.btn-stars {
  background: linear-gradient(135deg, #d4a017, #f0c040, #c8920e);
  color: #1a0f00;
  box-shadow: 0 4px 16px color-mix(in srgb, #d4a017 35%, transparent);
}

.btn-vodafone {
  background: linear-gradient(135deg, #c0392b, #e74c3c, #a93226);
  color: #fff;
  box-shadow: 0 4px 16px color-mix(in srgb, #c0392b 30%, transparent);
}

.btn-icon { font-size: 19px; }

/* ══════════════════════════════════════════════
   SUPPORT PAGE
══════════════════════════════════════════════ */
.support-wrap { padding: 0 16px 16px; }

.support-hero {
  padding: 28px 0 24px;
  text-align: center;
}

.support-hero-icon {
  width: 72px; height: 72px;
  border-radius: 50%;
  background: linear-gradient(135deg,
    color-mix(in srgb, var(--gold) 20%, var(--bg2)),
    color-mix(in srgb, var(--gold) 8%, var(--bg2)));
  border: 1px solid color-mix(in srgb, var(--gold) 25%, transparent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  margin: 0 auto 16px;
  box-shadow: 0 4px 20px color-mix(in srgb, var(--gold) 15%, transparent);
}

.support-hero h2 {
  font-family: var(--serif);
  font-size: 26px;
  font-weight: 600;
  margin-bottom: 8px;
  letter-spacing: .2px;
}

.support-hero p {
  font-size: 14px;
  color: var(--muted);
  line-height: 1.6;
}

/* FAQ */
.faq-wrap {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 20px;
}

.faq-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
  transition: border-color .2s;
}

.faq-item.open {
  border-color: color-mix(in srgb, var(--accent) 35%, transparent);
}

.faq-q {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  font-size: 14px;
  font-weight: 600;
  gap: 12px;
}

.faq-arrow {
  color: var(--muted);
  font-size: 18px;
  transition: transform .2s;
  flex-shrink: 0;
}

.faq-item.open .faq-arrow { transform: rotate(180deg); color: var(--accent); }

.faq-a {
  max-height: 0;
  overflow: hidden;
  transition: max-height .3s ease, padding .3s ease;
}

.faq-a-inner {
  padding: 0 16px 14px;
  font-size: 13px;
  color: var(--muted);
  line-height: 1.65;
  border-top: 1px solid var(--border);
  padding-top: 12px;
}

.faq-item.open .faq-a { max-height: 300px; }

/* Contact button */
.contact-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 18px;
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: border-color .2s, box-shadow .2s;
  width: 100%;
  text-align: left;
  font-family: var(--sans);
  color: var(--text);
}
.contact-card:active {
  border-color: color-mix(in srgb, var(--accent) 35%, transparent);
}

.contact-icon {
  width: 46px; height: 46px;
  border-radius: 13px;
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.contact-text { flex: 1; }
.contact-text h3 { font-size: 15px; font-weight: 600; margin-bottom: 3px; }
.contact-text p  { font-size: 13px; color: var(--muted); }

.contact-arrow {
  color: var(--muted);
  font-size: 20px;
}

/* ══════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════ */
#toast {
  position: fixed;
  bottom: calc(var(--nav-h) + 16px);
  left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: var(--text);
  color: var(--bg);
  padding: 10px 20px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  opacity: 0;
  pointer-events: none;
  white-space: nowrap;
  z-index: 999;
  transition: opacity .2s, transform .2s;
  display: flex;
  align-items: center;
  gap: 7px;
}
#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
</style>
</head>
<body>
<div id="app">

  <!-- ══ HEADER ══ -->
  <header>
    <div class="hdr-brand">
      <div class="hdr-icon">📖</div>
      <div class="hdr-title">Med<span>Book</span></div>
    </div>
    <button class="hdr-cart-btn" onclick="switchTab('cart')" aria-label="Cart">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>

        <div class="skel-hero shimmer"></div>

          <div class="skel-row"><div class="skel-cover shimmer"></div><div class="skel-lines"><div class="skel-line w80 shimmer"></div><div class="skel-line w65 shimmer"></div><div class="skel-line w50 shimmer"></div></div></div>
          <div class="skel-row"><div class="skel-cover shimmer"></div><div class="skel-lines"><div class="skel-line w80 shimmer"></div><div class="skel-line w65 shimmer"></div><div class="skel-line w50 shimmer"></div></div></div>

  </div><!-- /content -->

  <!-- ══ BOTTOM NAV ══ -->
  <nav>
    <button class="nav-tab active" id="tab-home" onclick="switchTab('home')">
      <div class="nav-tab-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/>
          <path d="M9 21V12h6v9"/>
        </svg>
      </div>
      Home
    </button>
    <button class="nav-tab" id="tab-cart" onclick="switchTab('cart')">
      <div class="nav-tab-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 001.95-1.57L23 6H6"/>
        </svg>
      </div>
      Cart
      <span class="nav-dot" id="nav-dot"></span>
    </button>
    <button class="nav-tab" id="tab-support" onclick="switchTab('support')">
      <div class="nav-tab-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
        </svg>
      </div>
      Support
    </button>

</div>

<!-- ══ DETAIL SHEET ══ -->
<div class="sheet-overlay" id="sheet" onclick="onSheetOverlayClick(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div id="sheet-body"></div>
  </div>
</div>

<!-- ══ TOAST ══ -->
<div id="toast"></div>

<script>
/* ════════════════════════════════════════════
   Telegram WebApp
════════════════════════════════════════════ */
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();
const MB = tg.MainButton;

/* ════════════════════════════════════════════
   State
════════════════════════════════════════════ */
let books = [];
let cart  = {};   // { bookId: qty }

/* ════════════════════════════════════════════
   FAQ Data
════════════════════════════════════════════ */
const FAQ = [
  {
    q: "How are books delivered?",
    a: "After your payment is confirmed, the PDF is sent directly to this Telegram chat. No download links — the file lands right here."
  },
  {
    q: "How does Vodafone Cash payment work?",
    a: "You send the amount to our Vodafone Cash number, then send us your phone number and a screenshot of the transfer. Our admin verifies it and delivers your book — usually within minutes."
  },
  {
    q: "What are Telegram Stars?",
    a: "Stars are Telegram's built-in digital currency. You can buy them inside Telegram's settings. Paying with Stars is instant and automatic — your book arrives immediately after payment."
  },
  {
    q: "Can I buy multiple books at once?",
    a: "Yes! Add any books to your cart and check out together. All books will be delivered in one go once payment is confirmed."
  },
  {
    q: "What if my payment was refused?",
    a: "If your Vodafone Cash screenshot couldn't be verified, you'll be notified. Please ensure the screenshot clearly shows the transferred amount and recipient number. Contact support if you need help."
  }
];

/* ════════════════════════════════════════════
   Tab Switching
════════════════════════════════════════════ */
function switchTab(tab) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById(`page-${tab}`).classList.add('active');
  document.getElementById(`tab-${tab}`).classList.add('active');
  if (tab === 'cart') renderCart();
  haptic('selection');
}

/* ════════════════════════════════════════════
   Load Books
════════════════════════════════════════════ */
async function loadBooks() {
  try {
    const r = await fetch('/api/books');
    const d = await r.json();
    books = d.books || [];
  } catch(e) {
    books = [];
  }
  renderHome();
}

/* ════════════════════════════════════════════
   Render Home
════════════════════════════════════════════ */
function renderHome() {
  const wrap = document.getElementById('home-inner');
  if (!books.length) {
    wrap.innerHTML = `
      <div style="text-align:center;padding:60px 24px;color:var(--muted)">
        <div style="font-size:48px;margin-bottom:16px">📭</div>
        <p style="font-family:var(--serif);font-size:20px;color:var(--text);margin-bottom:8px">No books yet</p>
        <p style="font-size:14px;line-height:1.6">Check back soon — new titles are added regularly.</p>
      </div>`;
    return;
  }

  const [featured, ...rest] = books;
  let html = '';

  // Hero — first book
  html += `
    <div class="hero-wrap">
      <div class="hero-card" onclick="openSheet(${featured.id})">
        ${featured.cover_url
          ? `<img class="hero-cover" src="${featured.cover_url}" alt="${esc(featured.title)}"/>`
          : `<div class="hero-cover-ph">📖</div>`}
        <div class="hero-gradient"></div>
        <div class="hero-tag">Featured</div>
        <div class="hero-body">
          <div class="hero-title">${esc(featured.title)}</div>
          <div class="hero-meta">
            <div class="hero-prices">
              <span class="price-tag stars">⭐ ${featured.price_stars}</span>
              <span class="price-tag egp">💵 ${featured.price_egp.toFixed(2)}</span>
            </div>
            <button class="hero-add-btn ${cart[featured.id]?'added':''}"
              id="hadd-${featured.id}"
              onclick="event.stopPropagation();quickAdd(${featured.id})">
              ${cart[featured.id] ? '✓' : '+'}
            </button>
          </div>
        </div>
      </div>
    </div>`;

  // Rest list
  if (rest.length) {
    html += `
      <div class="section-hdr">
        <h2>All <em>Books</em></h2>
        <span class="section-count">${books.length} titles</span>
      </div>
      <div class="books-list">
        ${rest.map(b => bookRowHtml(b)).join('')}
      </div>`;
  }

  wrap.innerHTML = html;
}

function bookRowHtml(b) {
  const added = !!cart[b.id];
  return `
    <div class="book-row" onclick="openSheet(${b.id})">
      ${b.cover_url
        ? `<img class="book-row-cover" src="${b.cover_url}" alt="${esc(b.title)}"/>`
        : `<div class="book-row-cover-ph">📖</div>`}
      <div class="book-row-info">
        <div class="book-row-title">${esc(b.title)}</div>
        <div class="book-row-desc">${esc(b.description || 'Medical reference book')}</div>
        <div class="book-row-footer">
          <span class="book-row-price stars">⭐ ${b.price_stars}</span>
          <span class="book-row-price egp">💵 ${b.price_egp.toFixed(2)} EGP</span>
        </div>
      </div>
      <button class="book-row-add ${added?'added':''}"
        id="radd-${b.id}"
        onclick="event.stopPropagation();quickAdd(${b.id})">
        ${added ? '✓' : '+'}
      </button>
    </div>`;
}

/* ════════════════════════════════════════════
   Book Detail Sheet
════════════════════════════════════════════ */
function openSheet(bookId) {
  const b = books.find(x => x.id === bookId);
  if (!b) return;
  haptic('light');

  const added = !!cart[b.id];
  document.getElementById('sheet-body').innerHTML = `
    <div class="sheet-cover-wrap">
      ${b.cover_url
        ? `<img class="sheet-cover" src="${b.cover_url}" alt="${esc(b.title)}"/>`
        : `<div class="sheet-cover-ph">📖</div>`}
    </div>
    <div class="sheet-body">
      <div class="sheet-label">Medical Reference</div>
      <div class="sheet-title">${esc(b.title)}</div>
      <p class="sheet-desc">${esc(b.description || 'A comprehensive medical reference book.')}</p>
      <div class="sheet-divider"></div>
      <div class="sheet-price-row">
        <div class="sheet-price-pill pill-gold">
          <span class="pill-label">Telegram Stars</span>
          <span class="pill-value">⭐ ${b.price_stars}</span>
        </div>
        <div class="sheet-price-pill pill-neutral">
          <span class="pill-label">Vodafone Cash</span>
          <span class="pill-value">${b.price_egp.toFixed(2)} EGP</span>
        </div>
      </div>
      <div class="sheet-btns">
        <button class="btn btn-outline" onclick="closeSheet()">Close</button>
        <button class="btn btn-gold" id="sheet-add-btn" onclick="addFromSheet(${b.id})">
          ${added ? '✓ In Cart' : '+ Add to Cart'}
        </button>
      </div>
    </div>`;

  document.getElementById('sheet').classList.add('open');
  tg.BackButton.show();
  tg.BackButton.onClick(closeSheet);
}

function closeSheet() {
  document.getElementById('sheet').classList.remove('open');
  tg.BackButton.hide();
  tg.BackButton.offClick(closeSheet);
}

function onSheetOverlayClick(e) {
  if (e.target === document.getElementById('sheet')) closeSheet();
}

function addFromSheet(bookId) {
  addToCart(bookId);
  closeSheet();
  switchTab('cart');
}

/* ════════════════════════════════════════════
   Cart Logic
════════════════════════════════════════════ */
function quickAdd(bookId) {
  addToCart(bookId);
}

function addToCart(bookId) {
  cart[bookId] = (cart[bookId] || 0) + 1;
  updateBadges();
  refreshAddBtns(bookId);
  showToast('📚 Added to cart');
  haptic('medium');
}

function removeFromCart(bookId) {
  delete cart[bookId];
  updateBadges();
  refreshAddBtns(bookId);
  renderCart();
  haptic('light');
}

function changeQty(bookId, delta) {
  const newQty = (cart[bookId] || 0) + delta;
  if (newQty <= 0) return removeFromCart(bookId);
  cart[bookId] = newQty;
  renderCart();
  haptic('selection');
}

function cartList() {
  return Object.entries(cart)
    .filter(([,q]) => q > 0)
    .map(([id, qty]) => ({ book: books.find(b => b.id == id), qty }))
    .filter(x => x.book);
}

function cartTotals() {
  return cartList().reduce((acc, {book, qty}) => ({
    stars: acc.stars + book.price_stars * qty,
    egp:   acc.egp   + book.price_egp   * qty,
    count: acc.count + qty
  }), { stars: 0, egp: 0, count: 0 });
}

function updateBadges() {
  const count = Object.values(cart).reduce((a,b) => a+b, 0);
  const show = count > 0;
  const hdrB = document.getElementById('hdr-badge');
  const navD = document.getElementById('nav-dot');
  hdrB.textContent = count;
  hdrB.classList.toggle('visible', show);
  navD.classList.toggle('visible', show);
}

function refreshAddBtns(bookId) {
  const added = !!cart[bookId];
  [`hadd-${bookId}`, `radd-${bookId}`].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.className = el.className.replace(' added','') + (added ? ' added' : '');
    el.textContent = added ? '✓' : '+';
  });
}

/* ════════════════════════════════════════════
   Render Cart
════════════════════════════════════════════ */
function renderCart() {
  const items  = cartList();
  const totals = cartTotals();
  const wrap   = document.getElementById('cart-inner');

  if (!items.length) {
    wrap.innerHTML = `
      <div class="cart-empty">
        <div class="cart-empty-icon">🛒</div>
        <h3>Your cart is empty</h3>
        <p>Browse medical books on the<br>Home tab and add what you need.</p>
        <button class="cart-empty-btn" onclick="switchTab('home')">Browse Books</button>
      </div>`;
    return;
  }

  const itemsHtml = items.map(({book, qty}) => `
    <div class="cart-item">
      ${book.cover_url
        ? `<img class="cart-item-cover" src="${book.cover_url}" alt="${esc(book.title)}"/>`
        : `<div class="cart-item-cover-ph">📖</div>`}
      <div class="cart-item-info">
        <div class="cart-item-title">${esc(book.title)}</div>
        <div class="cart-item-price">⭐ ${book.price_stars} Stars &nbsp;·&nbsp; ${book.price_egp.toFixed(2)} EGP</div>
        <div class="qty-row">
          <button class="qty-btn" onclick="changeQty(${book.id},-1)">−</button>
          <span class="qty-val">${qty}</span>
          <button class="qty-btn" onclick="changeQty(${book.id},+1)">+</button>
        </div>
      </div>
      <button class="cart-remove" onclick="removeFromCart(${book.id})" aria-label="Remove">
        🗑
      </button>
    </div>`).join('');

  const slipRows = items.map(({book, qty}) => `
    <div class="slip-row">
      <span class="label">${esc(book.title)} × ${qty}</span>
      <span class="value">${(book.price_egp * qty).toFixed(2)} EGP</span>
    </div>`).join('');

  wrap.innerHTML = `
    <div class="cart-items-wrap">${itemsHtml}</div>

    <div class="order-slip">
      <div class="slip-header">
        <span class="slip-header-icon">🧾</span>
        <span class="slip-header-title">Order Summary</span>
      </div>
      <div class="slip-rows">${slipRows}</div>
      <div class="slip-total">
        <span class="label">Total</span>
        <div class="values">
          <span class="v-stars">⭐ ${totals.stars} Stars</span>
          <span class="v-egp">${totals.egp.toFixed(2)} EGP</span>
        </div>
      </div>
    </div>

    <div class="checkout-section">
      <div class="checkout-label">Choose payment method</div>
      <div class="checkout-btns">
        <button class="checkout-btn btn-stars" onclick="checkout('stars')">
          <span class="btn-icon">⭐</span>
          Pay with Telegram Stars
        </button>
        <button class="checkout-btn btn-vodafone" onclick="checkout('vodafone')">
          <span class="btn-icon">📱</span>
          Pay via Vodafone Cash
        </button>
      </div>
    </div>`;
}

/* ════════════════════════════════════════════
   Checkout
════════════════════════════════════════════ */
function checkout(method) {
  const items = cartList();
  if (!items.length) return;
  haptic('medium');
  tg.sendData(JSON.stringify({
    action: method === 'stars' ? 'checkout_stars' : 'checkout_vodafone',
    cart: items.map(({book, qty}) => ({ book_id: book.id, quantity: qty }))
  }));
}

/* ════════════════════════════════════════════
   FAQ
════════════════════════════════════════════ */
function renderFaq() {
  const wrap = document.getElementById('faq-list');
  wrap.innerHTML = FAQ.map((f, i) => `
    <div class="faq-item" id="faq-${i}">
      <div class="faq-q" onclick="toggleFaq(${i})">
        <span>${f.q}</span>
        <span class="faq-arrow">⌄</span>
      </div>
      <div class="faq-a">
        <div class="faq-a-inner">${f.a}</div>
      </div>
    </div>`).join('');
}

function toggleFaq(i) {
  const el = document.getElementById(`faq-${i}`);
  const isOpen = el.classList.contains('open');
  document.querySelectorAll('.faq-item').forEach(x => x.classList.remove('open'));
  if (!isOpen) el.classList.add('open');
  haptic('selection');
}

function openChat() {
  haptic('light');
  tg.sendData(JSON.stringify({ action: 'support', type: 'chat' }));
}

/* ════════════════════════════════════════════
   Utils
════════════════════════════════════════════ */
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

function haptic(style) {
  try { tg.HapticFeedback.impactOccurred(style); } catch(e) {}
}

function esc(s) {
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ════════════════════════════════════════════
   Boot
════════════════════════════════════════════ */
renderFaq();
loadBooks();
</script>
