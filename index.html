<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>MedBook Store</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet"/>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  /* ── CSS Variables pulled from Telegram theme ── */
  :root {
    --bg:          var(--tg-theme-bg-color,           #ffffff);
    --bg2:         var(--tg-theme-secondary-bg-color, #f4f4f5);
    --text:        var(--tg-theme-text-color,         #1a1a2e);
    --hint:        var(--tg-theme-hint-color,         #8a8a9a);
    --link:        var(--tg-theme-link-color,         #2563eb);
    --btn:         var(--tg-theme-button-color,       #2563eb);
    --btn-text:    var(--tg-theme-button-text-color,  #ffffff);
    --accent:      #e63946;
    --gold:        #f4a522;
    --radius:      14px;
    --card-shadow: 0 2px 16px rgba(0,0,0,.08);
    --font-display:"DM Serif Display", Georgia, serif;
    --font-body:   "DM Sans", system-ui, sans-serif;
    --nav-h:       68px;
    --header-h:    56px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 15px;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* ════════════ LAYOUT ════════════ */
  #app {
    display: flex;
    flex-direction: column;
    height: 100%;
  }

/* ════════════ PREMIUM GLASS HEADER ════════════ */

header {
  position: sticky;
  top: 0;
  z-index: 100;

  height: var(--header-h);

  display: flex;
  align-items: center;
  gap: 12px;

  padding:
    calc(env(safe-area-inset-top, 0) + 6px)
    18px
    10px;

  background:
    linear-gradient(
      to bottom,
      rgba(255,255,255,.72),
      rgba(255,255,255,.42)
    );

  backdrop-filter:
    blur(22px)
    saturate(180%);

  -webkit-backdrop-filter:
    blur(22px)
    saturate(180%);

  border-bottom:
    1px solid rgba(255,255,255,.10);

  box-shadow:
    0 4px 24px rgba(0,0,0,.05),
    inset 0 -1px 0 rgba(255,255,255,.06);

  flex-shrink: 0;

  overflow: hidden;
}

header::before {
  content: "";

  position: absolute;
  inset: 0;

  background:
    radial-gradient(
      circle at top left,
      color-mix(in srgb, var(--btn) 18%, transparent),
      transparent 45%
    ),
    radial-gradient(
      circle at top right,
      color-mix(in srgb, #7c3aed 14%, transparent),
      transparent 40%
    );

  opacity: .9;

  pointer-events: none;
}

@media (prefers-color-scheme: dark) {
  header {
    background:
      linear-gradient(
        to bottom,
        rgba(15,15,20,.78),
        rgba(15,15,20,.45)
      );

    border-bottom:
      1px solid rgba(255,255,255,.04);

    box-shadow:
      0 4px 24px rgba(0,0,0,.28),
      inset 0 -1px 0 rgba(255,255,255,.03);
  }
}

.logo-mark {
  position: relative;

  width: 38px;
  height: 38px;

  border-radius: 14px;

  display: grid;
  place-items: center;

  font-size: 18px;

  background:
    linear-gradient(
      135deg,
      color-mix(in srgb, var(--btn) 92%, white),
      color-mix(in srgb, #7c3aed 45%, var(--btn))
    );

  color: white;

  box-shadow:
    0 6px 18px color-mix(in srgb, var(--btn) 30%, transparent),
    inset 0 1px 0 rgba(255,255,255,.18);

  flex-shrink: 0;

  overflow: hidden;
}

.logo-mark::before {
  content: "";

  position: absolute;
  inset: 0;

  background:
    linear-gradient(
      120deg,
      transparent 20%,
      rgba(255,255,255,.22) 50%,
      transparent 80%
    );

  transform: translateX(-120%);
  animation: logoShine 5s infinite linear;
}

@keyframes logoShine {
  to {
    transform: translateX(120%);
  }
}

  .logo-text {
    font-family: var(--font-display);
    font-size: 19px;
    letter-spacing: -.3px;
    line-height: 1;
    flex: 1;
  }

#cart-badge-header {
  position: relative;

  width: 40px;
  height: 40px;

  display: flex;
  align-items: center;
  justify-content: center;

  border-radius: 14px;

  background:
    rgba(255,255,255,.08);

  backdrop-filter: blur(12px);

  border: 1px solid rgba(255,255,255,.08);

  transition:
    transform .18s ease,
    background .25s ease;
}

#cart-badge-header:active {
  transform: scale(.92);
}

#cart-badge-header svg {
  width: 20px;
  height: 20px;
}

  /* scrollable content area */
  #content {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding-bottom: calc(var(--nav-h) + 8px);
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
  }

/* ════════════ GLASS BOTTOM NAV ════════════ */
nav {
  position: fixed;
  left: 12px;
  right: 12px;
  bottom: 12px;

  height: calc(var(--nav-h) - 8px);

  display: flex;
  align-items: center;
  justify-content: space-around;

  padding: 8px;

  border-radius: 24px;

  background: rgba(255,255,255,0.08);

  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);

  border: 1px solid rgba(255,255,255,0.12);

  box-shadow:
    0 8px 32px rgba(0,0,0,.18),
    inset 0 1px 0 rgba(255,255,255,.08);

  z-index: 200;

  padding-bottom: calc(env(safe-area-inset-bottom, 0) + 8px);
}

/* Dark mode support */
@media (prefers-color-scheme: dark) {
  nav {
    background: rgba(20,20,25,0.55);
    border: 1px solid rgba(255,255,255,0.06);
  }
}

.nav-tab {
  flex: 1;

  height: 100%;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  gap: 4px;

  border: none;
  background: transparent;

  color: var(--hint);

  font-family: var(--font-body);
  font-size: 11px;
  font-weight: 600;

  border-radius: 18px;

  position: relative;
  overflow: hidden;

  cursor: pointer;

  transition:
    transform .18s ease,
    color .2s ease,
    background .25s ease;

  -webkit-tap-highlight-color: transparent;
}

.nav-tab svg {
  width: 22px;
  height: 22px;
  stroke-width: 2;
  transition: transform .2s ease;
}

/* Hover / Press */
.nav-tab:active {
  transform: scale(.94);
}

/* Active tab */
.nav-tab.active {
  color: #fff;

  background:
    linear-gradient(
      135deg,
      color-mix(in srgb, var(--btn) 88%, white),
      color-mix(in srgb, var(--btn) 65%, #7c3aed)
    );

  box-shadow:
    0 4px 18px color-mix(in srgb, var(--btn) 40%, transparent),
    inset 0 1px 0 rgba(255,255,255,.18);
}

.nav-tab.active svg {
  transform: translateY(-1px) scale(1.05);
}

.nav-tab .nav-badge {
  position: absolute;

  top: 6px;
  right: 22%;

  min-width: 16px;
  height: 16px;

  padding: 0 4px;

  border-radius: 999px;

  background: linear-gradient(135deg, #ff4d6d, #ff1744);

  color: white;

  font-size: 9px;
  font-weight: 700;

  display: flex;
  align-items: center;
  justify-content: center;

  box-shadow: 0 4px 10px rgba(255, 23, 68, .35);

  border: 2px solid rgba(255,255,255,.12);

  backdrop-filter: blur(10px);

  display: none;
}
  /* ════════════ PAGES ════════════ */
/* ════════════ SMOOTH PAGE TRANSITIONS ════════════ */
.page,
.nav-tab,
.book-card,
.support-card {
  transform: translateZ(0);
  backface-visibility: hidden;
}


#content {
  position: relative;
  overflow-x: hidden;
}

/* pages */
.page {
  position: absolute;
  inset: 0;

  width: 100%;
  min-height: 100%;

  opacity: 0;
  visibility: hidden;

  transform:
    translateX(24px)
    scale(.985);

  transition:
    opacity .34s cubic-bezier(.22,1,.36,1),
    transform .34s cubic-bezier(.22,1,.36,1),
    visibility .34s;

  will-change: transform, opacity;

  pointer-events: none;
}

/* active page */
.page.active {
  opacity: 1;
  visibility: visible;

  transform:
    translateX(0)
    scale(1);

  pointer-events: auto;

  z-index: 2;
}

/* outgoing animation */
.page.leaving {
  opacity: 0;

  transform:
    translateX(-18px)
    scale(.98);

  z-index: 1;
}

  /* ════════════ HOME PAGE ════════════ */
  .section-label {
    padding: 20px 16px 10px;
    font-family: var(--font-display);
    font-size: 22px;
    letter-spacing: -.4px;
  }

  .books-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 0 12px 12px;
  }

  .book-card {
    background: var(--bg2);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--card-shadow);
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
    -webkit-tap-highlight-color: transparent;
    position: relative;
  }

  .book-card:active { transform: scale(.97); }

  .book-cover {
    width: 100%;
    aspect-ratio: 3/4;
    object-fit: cover;
    display: block;
    background: color-mix(in srgb, var(--btn) 12%, var(--bg2));
  }

  .book-cover-placeholder {
    width: 100%;
    aspect-ratio: 3/4;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg,
      color-mix(in srgb, var(--btn) 15%, var(--bg2)),
      color-mix(in srgb, var(--btn) 5%,  var(--bg2)));
    font-size: 36px;
    gap: 6px;
  }

  .book-cover-placeholder span {
    font-size: 10px;
    color: var(--hint);
    font-weight: 500;
    text-align: center;
    padding: 0 8px;
    line-height: 1.3;
  }

  .book-info {
    padding: 10px 10px 12px;
  }

  .book-title {
    font-weight: 600;
    font-size: 13px;
    line-height: 1.3;
    margin-bottom: 6px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .book-prices {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .price-stars {
    font-size: 12px;
    color: var(--gold);
    font-weight: 600;
  }

  .price-egp {
    font-size: 12px;
    color: var(--hint);
  }

  .add-to-cart-btn {
    width: 100%;
    margin-top: 8px;
    padding: 8px 0;
    background: var(--btn);
    color: var(--btn-text);
    border: none;
    border-radius: 9px;
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .15s, transform .1s;
    -webkit-tap-highlight-color: transparent;
  }
  .add-to-cart-btn:active { transform: scale(.96); opacity: .85; }
  .add-to-cart-btn.added {
    background: color-mix(in srgb, var(--btn) 20%, var(--bg2));
    color: var(--btn);
  }

  /* book detail sheet */
  .sheet-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.5);
    z-index: 300;
    display: none;
    align-items: flex-end;
  }
  .sheet-overlay.open { display: flex; }

  .sheet {
    background: var(--bg);
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-height: 88vh;
    overflow-y: auto;
    padding: 16px 16px 32px;
    animation: slideUp .25s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }

  .sheet-handle {
    width: 36px; height: 4px;
    background: var(--hint);
    border-radius: 2px;
    margin: 0 auto 16px;
    opacity: .4;
  }

  .sheet-cover {
    width: 100%;
    max-height: 260px;
    object-fit: contain;
    border-radius: 12px;
    margin-bottom: 16px;
    display: block;
  }

  .sheet-title {
    font-family: var(--font-display);
    font-size: 22px;
    margin-bottom: 8px;
    letter-spacing: -.3px;
  }

  .sheet-desc {
    color: var(--hint);
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 16px;
  }

  .sheet-prices {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
  }

  .sheet-price-pill {
    padding: 7px 14px;
    border-radius: 20px;
    font-weight: 600;
    font-size: 14px;
  }

  .pill-stars { background: color-mix(in srgb, var(--gold) 15%, var(--bg2)); color: var(--gold); }
  .pill-egp   { background: var(--bg2); color: var(--text); }

  .sheet-actions {
    display: flex;
    gap: 10px;
  }

  .btn-primary, .btn-secondary {
    flex: 1;
    padding: 14px 0;
    border: none;
    border-radius: var(--radius);
    font-family: var(--font-body);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .15s, transform .1s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-primary  { background: var(--btn); color: var(--btn-text); }
  .btn-secondary {
    background: var(--bg2);
    color: var(--text);
    border: 1.5px solid color-mix(in srgb, var(--hint) 30%, transparent);
  }
  .btn-primary:active, .btn-secondary:active { transform: scale(.97); opacity: .85; }

  /* ════════════ CART PAGE ════════════ */
  .cart-empty {
    text-align: center;
    padding: 60px 24px;
    color: var(--hint);
  }
  .cart-empty .emoji { font-size: 48px; display: block; margin-bottom: 12px; }
  .cart-empty p { font-size: 15px; }

  .cart-list {
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .cart-item {
    background: var(--bg2);
    border-radius: var(--radius);
    padding: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .cart-item-cover {
    width: 52px; height: 68px;
    object-fit: cover;
    border-radius: 8px;
    flex-shrink: 0;
    background: color-mix(in srgb, var(--btn) 10%, var(--bg2));
  }

  .cart-item-info { flex: 1; min-width: 0; }

  .cart-item-title {
    font-weight: 600;
    font-size: 13px;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .cart-item-price {
    font-size: 12px;
    color: var(--hint);
  }

  .qty-control {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 6px;
  }

  .qty-btn {
    width: 26px; height: 26px;
    border-radius: 7px;
    border: none;
    background: color-mix(in srgb, var(--btn) 15%, var(--bg2));
    color: var(--btn);
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }

  .qty-value {
    font-size: 14px;
    font-weight: 600;
    min-width: 18px;
    text-align: center;
  }

  .cart-remove-btn {
    width: 32px; height: 32px;
    border-radius: 8px;
    border: none;
    background: color-mix(in srgb, var(--accent) 12%, var(--bg2));
    color: var(--accent);
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }

  .cart-summary {
    margin: 8px 12px;
    background: var(--bg2);
    border-radius: var(--radius);
    padding: 14px 16px;
  }

  .cart-summary-row {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    padding: 4px 0;
  }

  .cart-summary-row.total {
    font-weight: 700;
    font-size: 16px;
    border-top: 1px solid color-mix(in srgb, var(--hint) 25%, transparent);
    margin-top: 8px;
    padding-top: 10px;
  }

  .checkout-methods {
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .checkout-btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: var(--radius);
    font-family: var(--font-body);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: transform .1s, opacity .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .checkout-btn:active { transform: scale(.98); opacity: .85; }

  .checkout-stars {
    background: linear-gradient(135deg, #f4a522, #e8890c);
    color: #fff;
  }

  .checkout-vodafone {
    background: linear-gradient(135deg, #e63946, #c1121f);
    color: #fff;
  }

  /* ════════════ SUPPORT PAGE ════════════ */
  .support-wrap {
    padding: 24px 16px;
  }

  .support-hero {
    text-align: center;
    padding: 24px 0 32px;
  }

  .support-hero .hero-icon {
    font-size: 56px;
    display: block;
    margin-bottom: 14px;
  }

  .support-hero h2 {
    font-family: var(--font-display);
    font-size: 24px;
    margin-bottom: 8px;
  }

  .support-hero p {
    color: var(--hint);
    font-size: 14px;
    line-height: 1.6;
  }

  .support-cards {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .support-card {
    background: var(--bg2);
    border-radius: var(--radius);
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: opacity .15s;
    -webkit-tap-highlight-color: transparent;
    border: none;
    width: 100%;
    text-align: left;
    color: var(--text);
    font-family: var(--font-body);
  }
  .support-card:active { opacity: .75; }

  .support-card-icon {
    width: 44px; height: 44px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

.support-card-icon {
  width: 50px;
  height: 50px;

  border-radius: 16px;

  display: flex;
  align-items: center;
  justify-content: center;

  flex-shrink: 0;

  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);

  border: 1px solid rgba(255,255,255,.08);

  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.08),
    0 4px 14px rgba(0,0,0,.08);
}

.support-card-icon svg {
  width: 24px;
  height: 24px;
  stroke-width: 2;
}

/* Individual colors */
.support-chat-icon {
  background: linear-gradient(
    135deg,
    rgba(37,99,235,.18),
    rgba(59,130,246,.08)
  );
  color: #3b82f6;
}

.support-orders-icon {
  background: linear-gradient(
    135deg,
    rgba(245,158,11,.18),
    rgba(251,191,36,.08)
  );
  color: #f59e0b;
}

.support-payment-icon {
  background: linear-gradient(
    135deg,
    rgba(239,68,68,.18),
    rgba(248,113,113,.08)
  );
  color: #ef4444;
}

.support-refund-icon {
  background: linear-gradient(
    135deg,
    rgba(34,197,94,.18),
    rgba(74,222,128,.08)
  );
  color: #22c55e;
}

  .support-card-text h3 { font-size: 15px; font-weight: 600; margin-bottom: 3px; }
  .support-card-text p  { font-size: 13px; color: var(--hint); }

  .support-card .arrow {
    margin-left: auto;
    color: var(--hint);
    font-size: 18px;
  }

  /* ════════════ TOAST ════════════ */
  #toast {
    position: fixed;
    bottom: calc(var(--nav-h) + 14px);
    left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--text);
    color: var(--bg);
    padding: 10px 18px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    transition: opacity .2s, transform .2s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 999;
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ════════════ LOADING ════════════ */
  .skeleton {
    background: linear-gradient(90deg,
      var(--bg2) 25%,
      color-mix(in srgb, var(--hint) 15%, var(--bg2)) 50%,
      var(--bg2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 8px;
  }
  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .skeleton-card {
    background: var(--bg2);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .skeleton-cover { width: 100%; aspect-ratio: 3/4; }
  .skeleton-line { height: 12px; margin: 10px 10px 6px; }
  .skeleton-line.short { width: 60%; height: 10px; margin-bottom: 12px; }
</style>
</head>
<body>
<div id="app">

  <!-- ── Header ── -->
  <header>
    <div class="logo-mark">📖</div>
    <span class="logo-text">MedBook Store</span>
    <div id="cart-badge-header" onclick="switchTab('cart')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <path d="M16 10a4 4 0 01-8 0"/>
      </svg>
      <span class="badge" id="header-cart-count">0</span>
    </div>
  </header>

  <!-- ── Content ── -->
  <div id="content">

    <!-- HOME -->
    <div class="page active" id="page-home">
      <div class="section-label">Medical Books</div>
      <div class="books-grid" id="books-grid">
        <!-- skeleton -->
        <div class="skeleton-card"><div class="skeleton skeleton-cover"></div><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line short"></div></div>
        <div class="skeleton-card"><div class="skeleton skeleton-cover"></div><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line short"></div></div>
        <div class="skeleton-card"><div class="skeleton skeleton-cover"></div><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line short"></div></div>
        <div class="skeleton-card"><div class="skeleton skeleton-cover"></div><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line short"></div></div>
      </div>
    </div>

    <!-- CART -->
    <div class="page" id="page-cart">
      <div class="section-label">Your Cart</div>
      <div id="cart-content"></div>
    </div>

    <!-- SUPPORT -->
    <div class="page" id="page-support">
      <div class="support-wrap">
        <div class="support-hero">
          <span class="hero-icon">🏥</span>
          <h2>How can we help?</h2>
          <p>Reach out and we'll get back to you as soon as possible.</p>
        </div>
        <div class="support-cards">

          <!-- Live Chat -->
          <button class="support-card" onclick="openSupport('chat')">
            <div class="support-card-icon support-chat-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
              </svg>
            </div>

            <div class="support-card-text">
              <h3>Live Chat</h3>
              <p>Chat with our support team</p>
            </div>

            <span class="arrow">›</span>
          </button>

          <!-- Orders -->
          <button class="support-card" onclick="openSupport('orders')">
            <div class="support-card-icon support-orders-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M3 7l9-4 9 4-9 4-9-4z"/>
                <path d="M3 7v10l9 4 9-4V7"/>
                <path d="M12 11v10"/>
              </svg>
            </div>

            <div class="support-card-text">
              <h3>My Orders</h3>
              <p>Track or query your orders</p>
            </div>

            <span class="arrow">›</span>
          </button>

          <!-- Payment -->
          <button class="support-card" onclick="openSupport('payment')">
            <div class="support-card-icon support-payment-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <rect x="2" y="5" width="20" height="14" rx="2"/>
                <path d="M2 10h20"/>
              </svg>
            </div>

            <div class="support-card-text">
              <h3>Payment Issue</h3>
              <p>Problem with a payment?</p>
            </div>

            <span class="arrow">›</span>
          </button>

          <!-- Refund -->
          <button class="support-card" onclick="openSupport('refund')">
            <div class="support-card-icon support-refund-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M3 10h11a4 4 0 1 1 0 8h-1"/>
                <path d="M7 14l-4-4 4-4"/>
              </svg>
            </div>

            <div class="support-card-text">
              <h3>Refund Request</h3>
              <p>Request a refund for your order</p>
            </div>

            <span class="arrow">›</span>
          </button>

        </div>
      </div>
    </div>

  </div><!-- /content -->

  <!-- ── Bottom Nav ── -->
  <nav>
    <button class="nav-tab active" id="tab-home" onclick="switchTab('home')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/>
        <path d="M9 21V12h6v9"/>
      </svg>
      Home
    </button>
    <button class="nav-tab" id="tab-cart" onclick="switchTab('cart')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
        <path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 001.95-1.57L23 6H6"/>
      </svg>
      Cart
      <span class="nav-badge" id="cart-count">0</span>
    </button>
    <button class="nav-tab" id="tab-support" onclick="switchTab('support')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
      </svg>
      Support
    </button>
  </nav>

</div><!-- /app -->

<!-- ── Book Detail Sheet ── -->
<div class="sheet-overlay" id="sheet" onclick="closeSheet(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div id="sheet-content"></div>
  </div>
</div>

<!-- ── Toast ── -->
<div id="toast"></div>

<script>
/* ════════════════════════════════════════════
   Telegram WebApp Init
════════════════════════════════════════════ */
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

// ── Main Button helper ──────────────────────
const MB = tg.MainButton;

function showMainBtn(text, fn) {
  MB.setText(text);
  MB.onClick(fn);
  MB.show();
}
function hideMainBtn() {
  MB.offClick();
  MB.hide();
}

/* ════════════════════════════════════════════
   State
════════════════════════════════════════════ */
let books = [];
let cart  = {};   // { book_id: quantity }

/* ════════════════════════════════════════════
   Tab switching
════════════════════════════════════════════ */
let currentTab = 'home';

function switchTab(tab) {
  if (tab === currentTab) return;

  const currentPage = document.getElementById(`page-${currentTab}`);
  const nextPage = document.getElementById(`page-${tab}`);

  /* nav active */
  document.querySelectorAll('.nav-tab')
    .forEach(t => t.classList.remove('active'));

  document.getElementById(`tab-${tab}`)
    .classList.add('active');

  /* animate current page out */
  currentPage.classList.add('leaving');
  currentPage.classList.remove('active');

  /* animate new page in */
  nextPage.classList.add('active');

  /* cleanup */
  setTimeout(() => {
    currentPage.classList.remove('leaving');
  }, 350);

  currentTab = tab;

  /* cart logic */
  if (tab === 'cart') {
    renderCart();
    updateMainBtn();
  } else {
    hideMainBtn();
  }

  haptic('selection');
}

/* ════════════════════════════════════════════
   Load Books from Bot API
════════════════════════════════════════════ */
async function loadBooks() {
  try {
    const res  = await fetch('/api/books');
    const data = await res.json();
    books = data.books || [];
    renderBooks();
  } catch (e) {
    document.getElementById('books-grid').innerHTML =
      '<p style="padding:24px;color:var(--hint);grid-column:1/-1;">Failed to load books. Please try again.</p>';
  }
}

/* ════════════════════════════════════════════
   Render Books Grid
════════════════════════════════════════════ */
function renderBooks() {
  const grid = document.getElementById('books-grid');
  if (!books.length) {
    grid.innerHTML = '<p style="padding:24px;color:var(--hint);grid-column:1/-1;text-align:center;">No books available yet.</p>';
    return;
  }
  grid.innerHTML = books.map(b => {
    const inCart = cart[b.id] > 0;
    const coverHtml = b.cover_url
      ? `<img class="book-cover" src="${b.cover_url}" alt="${escHtml(b.title)}" loading="lazy"/>`
      : `<div class="book-cover-placeholder">📖<span>${escHtml(b.title)}</span></div>`;
    return `
    <div class="book-card" onclick="openSheet(${b.id})">
      ${coverHtml}
      <div class="book-info">
        <div class="book-title">${escHtml(b.title)}</div>
        <div class="book-prices">
          <span class="price-stars">⭐ ${b.price_stars} Stars</span>
          <span class="price-egp">💵 ${b.price_egp.toFixed(2)} EGP</span>
        </div>
        <button class="add-to-cart-btn ${inCart?'added':''}"
          id="atc-${b.id}"
          onclick="event.stopPropagation();addToCart(${b.id})">
          ${inCart ? '✓ In Cart' : '+ Add to Cart'}
        </button>
      </div>
    </div>`;
  }).join('');
}

/* ════════════════════════════════════════════
   Book Detail Sheet
════════════════════════════════════════════ */
function openSheet(bookId) {
  const b = books.find(x => x.id === bookId);
  if (!b) return;
  haptic('light');

  const coverHtml = b.cover_url
    ? `<img class="sheet-cover" src="${b.cover_url}" alt="${escHtml(b.title)}"/>`
    : `<div style="font-size:64px;text-align:center;padding:24px 0">📖</div>`;

  document.getElementById('sheet-content').innerHTML = `
    ${coverHtml}
    <div class="sheet-title">${escHtml(b.title)}</div>
    <p class="sheet-desc">${escHtml(b.description || 'No description available.')}</p>
    <div class="sheet-prices">
      <span class="sheet-price-pill pill-stars">⭐ ${b.price_stars} Stars</span>
      <span class="sheet-price-pill pill-egp">💵 ${b.price_egp.toFixed(2)} EGP</span>
    </div>
    <div class="sheet-actions">
      <button class="btn-secondary" onclick="closeSheet()">Close</button>
      <button class="btn-primary" onclick="addToCartFromSheet(${b.id})">
        ${cart[b.id] ? '✓ In Cart' : '+ Add to Cart'}
      </button>
    </div>
  `;
  document.getElementById('sheet').classList.add('open');

  tg.BackButton.show();
  tg.BackButton.onClick(closeSheet);
}

function closeSheet(e) {
  if (e && e.target !== document.getElementById('sheet')) return;
  document.getElementById('sheet').classList.remove('open');
  tg.BackButton.hide();
  tg.BackButton.offClick(closeSheet);
}

function addToCartFromSheet(bookId) {
  addToCart(bookId);
  closeSheet();
  switchTab('cart');
}

/* ════════════════════════════════════════════
   Cart
════════════════════════════════════════════ */
function addToCart(bookId) {
  cart[bookId] = (cart[bookId] || 0) + 1;
  updateCartBadge();
  updateBookCardBtn(bookId);
  showToast('Added to cart 🛒');
  haptic('medium');
}

function removeFromCart(bookId) {
  delete cart[bookId];
  updateCartBadge();
  updateBookCardBtn(bookId);
  renderCart();
  updateMainBtn();
  haptic('light');
}

function changeQty(bookId, delta) {
  cart[bookId] = (cart[bookId] || 0) + delta;
  if (cart[bookId] <= 0) return removeFromCart(bookId);
  renderCart();
  updateMainBtn();
  haptic('selection');
}

function cartItems() {
  return Object.entries(cart)
    .filter(([,q]) => q > 0)
    .map(([id, qty]) => ({
      book: books.find(b => b.id == id),
      qty: parseInt(qty)
    }))
    .filter(x => x.book);
}

function cartTotals() {
  return cartItems().reduce((acc, {book, qty}) => {
    acc.stars += book.price_stars * qty;
    acc.egp   += book.price_egp   * qty;
    return acc;
  }, { stars: 0, egp: 0 });
}

function updateCartBadge() {
  const count = Object.values(cart).reduce((a,b) => a + b, 0);
  const badge     = document.getElementById('cart-count');
  const hdrBadge  = document.getElementById('header-cart-count');
  const navBadge  = badge;

  if (count > 0) {
    badge.textContent = count;
    badge.style.display = 'flex';
    hdrBadge.textContent = count;
    hdrBadge.style.display = 'flex';
  } else {
    badge.style.display = 'none';
    hdrBadge.style.display = 'none';
  }
}

function updateBookCardBtn(bookId) {
  const btn = document.getElementById(`atc-${bookId}`);
  if (!btn) return;
  const inCart = cart[bookId] > 0;
  btn.textContent = inCart ? '✓ In Cart' : '+ Add to Cart';
  btn.className = 'add-to-cart-btn' + (inCart ? ' added' : '');
}

function renderCart() {
  const items = cartItems();
  const wrap  = document.getElementById('cart-content');

  if (!items.length) {
    wrap.innerHTML = `
      <div class="cart-empty">
        <span class="emoji">🛒</span>
        <p>Your cart is empty.<br>Browse books on the Home tab!</p>
      </div>`;
    return;
  }

  const totals = cartTotals();

  const itemsHtml = items.map(({book, qty}) => {
    const cover = book.cover_url
      ? `<img class="cart-item-cover" src="${book.cover_url}" alt="${escHtml(book.title)}"/>`
      : `<div class="cart-item-cover" style="display:flex;align-items:center;justify-content:center;font-size:24px">📖</div>`;
    return `
    <div class="cart-item">
      ${cover}
      <div class="cart-item-info">
        <div class="cart-item-title">${escHtml(book.title)}</div>
        <div class="cart-item-price">⭐ ${book.price_stars} · 💵 ${book.price_egp.toFixed(2)} EGP</div>
        <div class="qty-control">
          <button class="qty-btn" onclick="changeQty(${book.id},-1)">−</button>
          <span class="qty-value">${qty}</span>
          <button class="qty-btn" onclick="changeQty(${book.id},+1)">+</button>
        </div>
      </div>
      <button class="cart-remove-btn" onclick="removeFromCart(${book.id})">🗑</button>
    </div>`;
  }).join('');

  wrap.innerHTML = `
    <div class="cart-list">${itemsHtml}</div>
    <div class="cart-summary">
      <div class="cart-summary-row"><span>Items</span><span>${items.reduce((a,x)=>a+x.qty,0)}</span></div>
      <div class="cart-summary-row total">
        <span>Total</span>
        <span>⭐ ${totals.stars} · ${totals.egp.toFixed(2)} EGP</span>
      </div>
    </div>
    <div class="checkout-methods">
      <p style="font-size:13px;color:var(--hint);margin-bottom:4px;">Choose payment method:</p>
      <button class="checkout-btn checkout-stars" onclick="checkout('stars')">
        ⭐ Pay with Telegram Stars
      </button>
      <button class="checkout-btn checkout-vodafone" onclick="checkout('vodafone')">
        📱 Pay via Vodafone Cash
      </button>
    </div>
  `;
}

function updateMainBtn() {
  const items = cartItems();
  if (items.length && document.getElementById('tab-cart').classList.contains('active')) {
    const totals = cartTotals();
    showMainBtn(`Checkout — ⭐${totals.stars}`, () => checkout('stars'));
  } else {
    hideMainBtn();
  }
}

/* ════════════════════════════════════════════
   Checkout
════════════════════════════════════════════ */
function checkout(method) {
  const items = cartItems();
  if (!items.length) return showToast('Cart is empty');
  haptic('medium');

  const payload = {
    action: method === 'stars' ? 'checkout_stars' : 'checkout_vodafone',
    cart: items.map(({book, qty}) => ({ book_id: book.id, quantity: qty }))
  };

  tg.sendData(JSON.stringify(payload));
}

/* ════════════════════════════════════════════
   Support
════════════════════════════════════════════ */
function openSupport(type) {
  haptic('light');
  const messages = {
    chat:    'Hello! I need some help.',
    orders:  'Hello! I have a question about my order.',
    payment: 'Hello! I have a payment issue.',
    refund:  'Hello! I would like to request a refund.',
  };
  tg.sendData(JSON.stringify({ action: 'support', type, message: messages[type] }));
}

/* ════════════════════════════════════════════
   Utilities
════════════════════════════════════════════ */
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

function haptic(style) {
  try { tg.HapticFeedback.impactOccurred(style); } catch(e) {}
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ════════════════════════════════════════════
   Boot
════════════════════════════════════════════ */
loadBooks();
</script>
</body>
</html>
